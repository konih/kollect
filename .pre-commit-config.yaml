# Pre-commit hooks mirror CI checks where possible. Install with: pre-commit install
---
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^references/
      - id: end-of-file-fixer
        exclude: ^references/
      - id: check-yaml
        exclude: ^(references/|config/)
      - id: check-added-large-files
        args: [--maxkb=1000]

  - repo: local
    hooks:
      - id: scrub
        name: scrub forbidden strings (staged)
        entry: task scrub
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: verify
        name: verify generated artifacts
        entry: task verify
        language: system
        pass_filenames: false
        always_run: true
        require_serial: true

      - id: golangci-lint
        name: golangci-lint
        entry: task lint
        language: system
        types: [go]
        pass_filenames: false
        require_serial: true

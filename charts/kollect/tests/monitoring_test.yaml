suite: monitoring templates
templates:
  - servicemonitor.yaml
  - prometheusrule.yaml
tests:
  - it: renders nothing when monitoring disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ServiceMonitor when enabled
    set:
      metrics:
        enabled: true
        secure: true
        serviceMonitor:
          enabled: true
          interval: 30s
          scrapeTimeout: 10s
          labels:
            release: kube-prometheus-stack
    template: servicemonitor.yaml
    release:
      namespace: kollect-system
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kollect-controller-manager
      - equal:
          path: spec.endpoints[0].port
          value: metrics
      - equal:
          path: spec.endpoints[0].scheme
          value: https
      - equal:
          path: metadata.labels.release
          value: kube-prometheus-stack

  - it: renders PrometheusRule when enabled
    set:
      metrics:
        enabled: true
        prometheusRule:
          enabled: true
          labels:
            release: kube-prometheus-stack
    template: prometheusrule.yaml
    release:
      namespace: kollect-system
    asserts:
      - isKind:
          of: PrometheusRule
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kollect
      - matchRegex:
          path: spec.groups[0].rules[0].alert
          pattern: KollectMetricsTargetDown
      - matchRegex:
          path: spec.groups[0].rules[1].alert
          pattern: KollectOperatorNotReady

  - it: does not render ServiceMonitor when metrics disabled
    set:
      metrics:
        enabled: false
        serviceMonitor:
          enabled: true
    template: servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render PrometheusRule when disabled
    set:
      metrics:
        enabled: true
        prometheusRule:
          enabled: false
    template: prometheusrule.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: uses http scheme when metrics secure is false
    set:
      metrics:
        enabled: true
        secure: false
        serviceMonitor:
          enabled: true
    template: servicemonitor.yaml
    asserts:
      - equal:
          path: spec.endpoints[0].scheme
          value: http
      - notExists:
          path: spec.endpoints[0].tlsConfig

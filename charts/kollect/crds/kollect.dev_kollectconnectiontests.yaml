---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: kollectconnectiontests.kollect.dev
spec:
  group: kollect.dev
  names:
    kind: KollectConnectionTest
    listKind: KollectConnectionTestList
    plural: kollectconnectiontests
    shortNames:
    - kconntest
    singular: kollectconnectiontest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.sinkRef
      name: Sink
      type: string
    - jsonPath: .status.conditions[?(@.type=="ConnectionVerified")].status
      name: Verified
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KollectConnectionTest triggers an audited one-shot sink connectivity
          probe.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KollectConnectionTestSpec defines a one-shot connectivity
              probe (ADR-0703).
            properties:
              ownerSink:
                description: ownerSink sets an ownerReference to the sink when true
                  (default).
                type: boolean
              profileRef:
                description: profileRef optionally names a KollectProfile for future
                  composite probes.
                type: string
              sinkRef:
                description: sinkRef identifies exactly one family sink to probe (ADR-0414).
                properties:
                  databaseSinkRef:
                    description: databaseSinkRef names a KollectDatabaseSink in the
                      test's namespace.
                    type: string
                  eventSinkRef:
                    description: eventSinkRef names a KollectEventSink in the test's
                      namespace.
                    type: string
                  snapshotSinkRef:
                    description: snapshotSinkRef names a KollectSnapshotSink in the
                      test's namespace.
                    type: string
                type: object
              ttlSecondsAfterFinished:
                default: 300
                description: ttlSecondsAfterFinished deletes the CR after status.completed
                  plus this TTL.
                format: int32
                minimum: 0
                type: integer
            required:
            - sinkRef
            type: object
          status:
            description: KollectConnectionTestStatus reports probe outcome.
            properties:
              completed:
                description: completed is true after the probe has finished (success
                  or failure).
                type: boolean
              completedAt:
                description: completedAt is set when completed becomes true (used
                  for TTL cleanup).
                format: date-time
                type: string
              conditions:
                description: conditions represent the current state of the connection
                  test.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              latencyMs:
                description: latencyMs is the duration of the last probe in milliseconds.
                format: int64
                type: integer
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

# Default values for the kollect operator Helm chart.

nameOverride: ""
fullnameOverride: ""

createNamespace: false

image:
  repository: ghcr.io/konih/kollect
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

# Restrict the manager informer cache to these namespaces (empty = all namespaces).
# Use for per-team operator installs — mirrors external-secrets scoped controller pattern.
watchNamespaces: []

# When true, render a namespaced Role/RoleBinding instead of ClusterRole/ClusterRoleBinding.
# Cluster-scoped KollectProfile read requires a separate platform ClusterRole binding.
tenantMode: false

leaderElection:
  enabled: true

featureGates:
  inventoryHttp:
    enabled: false
    port: 8082
    authMode: kubernetes

# Optional oauth2-proxy sidecar for browser/OIDC access (ADR-0024). Not rendered yet.
oauth2Proxy:
  enabled: false

pprof:
  enabled: false
  bindAddress: ":6060"

controller:
  maxConcurrentReconciles:
    target: 5
    inventory: 3
    hub: 2
  exportDebounce: 30s
  reconcileRateLimit: ""

metrics:
  enabled: true
  bindAddress: ":8443"
  secure: true
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

webhooks:
  enabled: true
  certManager:
    create: true
    secretName: webhook-server-cert

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

extraArgs: []

# Default values for the kollect operator Helm chart.

nameOverride: ""
fullnameOverride: ""

createNamespace: false

image:
  repository: ghcr.io/konih/kollect
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

# Restrict the manager informer cache to these namespaces (empty = all namespaces).
# Use for per-team operator installs — mirrors external-secrets scoped controller pattern.
watchNamespaces: []

# When true, render a namespaced Role/RoleBinding instead of ClusterRole/ClusterRoleBinding.
# Namespaced KollectProfile is managed in the release namespace (ADR-0031).
tenantMode: false

# Operator deployment mode on the same image (ADR-0022 L3): single | hub | spoke
mode: single

# Hub/spoke transport backend (ADR-0023). Only inprocess is the production default until an
# external backend passes integration/e2e proof. Do not set redis/nats/kafka without ops sign-off.
transport:
  type: inprocess

# Default for KollectSink connection probes in bundled samples (ADR-0030).
# Production manifests should use false; dev/CI overlays set true.
sinkDefaults:
  connectionTest: false

leaderElection:
  enabled: true

featureGates:
  inventoryHttp:
    enabled: false
    port: 8082
    authMode: kubernetes

# Optional oauth2-proxy sidecar for browser/OIDC access (ADR-0024). Not rendered yet.
oauth2Proxy:
  enabled: false

pprof:
  enabled: false
  bindAddress: ":6060"

controller:
  maxConcurrentReconciles:
    target: 5
    inventory: 3
    hub: 2
  exportDebounce: 30s
  reconcileRateLimit: ""

metrics:
  enabled: true
  bindAddress: ":8443"
  secure: true
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

webhooks:
  enabled: true
  certManager:
    create: true
    secretName: webhook-server-cert

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

extraArgs: []

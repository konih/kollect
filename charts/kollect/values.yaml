# Default values for the kollect operator Helm chart.

nameOverride: ""
fullnameOverride: ""

createNamespace: false

image:
  repository: ghcr.io/konih/kollect
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

# Restrict the manager informer cache to these namespaces (empty = all namespaces).
# Use for per-team operator installs — mirrors external-secrets scoped controller pattern.
watchNamespaces: []

# Optional default namespace include/exclude lists for Target collection intent (ADR-0207).
# CRD fields on KollectTarget override these chart defaults.
defaultIncludedNamespaces: []
defaultExcludedNamespaces: []

# When true, render a namespaced Role/RoleBinding instead of ClusterRole/ClusterRoleBinding.
# Namespaced KollectProfile is managed in the release namespace (ADR-0204).
tenantMode: false

# Operator deployment mode on the same image (ADR-0501 L3): single | hub | spoke
mode: single

# Hub consumer settings (mode: hub). Namespaced KollectSink refs resolve in exportNamespace.
hub:
  name: platform
  platformNamespace: ""
  exportNamespace: ""
  sinkRefs: []
  remoteClusters: []
  ingestPort: 8083
  ingestAuthMode: kubernetes

# Hub/spoke transport backend (ADR-0502). Only inprocess is the production default until an
# external backend passes integration/e2e proof. Do not set redis/nats/kafka without ops sign-off.
transport:
  type: inprocess

# Default for KollectSink connection probes in bundled samples (ADR-0403).
# CRD default is true; set false to opt out of automatic probes.
sinkDefaults:
  connectionTest: false

leaderElection:
  enabled: true

featureGates:
  inventoryHttp:
    enabled: false
    port: 8082
    authMode: kubernetes

# Optional oauth2-proxy sidecar for browser/OIDC access (ADR-0404). Not rendered yet.
oauth2Proxy:
  enabled: false

pprof:
  enabled: false
  bindAddress: ":6060"

controller:
  maxConcurrentReconciles:
    target: 5
    inventory: 3
    hub: 2
  # Export debounce is per KollectInventory.spec.exportMinInterval (CRD default 30s).
  reconcileRateLimit: ""

metrics:
  enabled: true
  bindAddress: ":8443"
  secure: true
  # Prometheus Operator integration (requires monitoring.coreos.com CRDs, e.g. kube-prometheus-stack).
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    # Labels must match your Prometheus serviceMonitorSelector (kube-prometheus-stack default: release: kube-prometheus-stack).
    labels: {}
  prometheusRule:
    enabled: false
    # Labels must match your Prometheus ruleSelector (kube-prometheus-stack default: release: kube-prometheus-stack).
    labels: {}
    # Optional extra PrometheusRule entries appended to the kollect.rules group.
    additionalRules: []

webhooks:
  enabled: true
  certManager:
    create: true
    secretName: webhook-server-cert

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

extraArgs: []

# Optional kollect-ui subchart (static React SPA — default off).
ui:
  enabled: false
  readApiUrl: "http://kollect:8082"
  ingress:
    enabled: false
  image:
    repository: ghcr.io/konih/kollect-ui
    tag: ""

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kollect.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kollect.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kollect.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- include "kollect.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kollect.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: {{ include "kollect.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:8081
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address={{ .Values.metrics.bindAddress }}
            - --metrics-secure={{ .Values.metrics.secure }}
            {{- end }}
            - --max-concurrent-reconciles-target={{ .Values.controller.maxConcurrentReconciles.target }}
            - --max-concurrent-reconciles-inventory={{ .Values.controller.maxConcurrentReconciles.inventory }}
            - --max-concurrent-reconciles-hub={{ .Values.controller.maxConcurrentReconciles.hub }}
            - --export-debounce={{ .Values.controller.exportDebounce }}
            {{- if .Values.controller.reconcileRateLimit }}
            - --reconcile-rate-limit={{ .Values.controller.reconcileRateLimit }}
            {{- end }}
            {{- if .Values.pprof.enabled }}
            - --enable-pprof
            - --pprof-bind-address={{ .Values.pprof.bindAddress }}
            {{- end }}
            {{- if .Values.featureGates.inventoryHttp.enabled }}
            - --inventory-http-enabled
            - --inventory-http-port={{ .Values.featureGates.inventoryHttp.port }}
            - --inventory-auth-mode={{ .Values.featureGates.inventoryHttp.authMode }}
            {{- end }}
            {{- if .Values.webhooks.enabled }}
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
            {{- end }}
            {{- if .Values.watchNamespaces }}
            - --watch-namespaces={{ join "," .Values.watchNamespaces }}
            {{- end }}
            {{- if and .Values.mode (ne .Values.mode "single") (ne .Values.mode "cluster") }}
            - --mode={{ .Values.mode }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: 8443
              protocol: TCP
            {{- end }}
            {{- if .Values.webhooks.enabled }}
            - name: webhook-server
              containerPort: 9443
              protocol: TCP
            {{- end }}
            {{- if .Values.featureGates.inventoryHttp.enabled }}
            - name: inventory-http
              containerPort: {{ .Values.featureGates.inventoryHttp.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.pprof.enabled }}
            - name: pprof
              containerPort: 6060
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: KOLLECT_TRANSPORT_TYPE
              value: {{ .Values.transport.type | default "inprocess" | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.webhooks.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
      {{- if .Values.webhooks.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ .Values.webhooks.certManager.secretName }}
            defaultMode: 420
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

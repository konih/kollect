{{- if and .Values.rbac.create .Values.tenantMode }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kollect.fullname" . }}-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kollect.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kollect.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "kollect.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

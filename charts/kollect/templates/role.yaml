{{- if and .Values.rbac.create .Values.tenantMode }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kollect.fullname" . }}-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kollect.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  - apiGroups: [kollect.dev]
    resources: [kollectinventories, kollectprofiles, kollectsinks, kollecttargets, kollectscopes]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [kollect.dev]
    resources: [kollectinventories/finalizers, kollecttargets/finalizers]
    verbs: [update]
  - apiGroups: [kollect.dev]
    resources: [kollectinventories/status, kollectsinks/status, kollecttargets/status]
    verbs: [get, patch, update]
{{- end }}

# Nightly tenantMode e2e: namespaced Role RBAC, scoped watchNamespaces.
# Base profile: charts/kollect/values-minimal-rbac.yaml (inventory HTTP enabled for smoke).
featureGates:
  inventoryHttp:
    enabled: true
    authMode: disabled

webhooks:
  enabled: false

# Operator release namespace is also the sole watched namespace.
watchNamespaces:
  - kollect-tenant-ops

tenantMode: true

transport:
  type: inprocess

sinkDefaults:
  connectionTest: false

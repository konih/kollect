apiVersion: kollect.dev/v1alpha1
kind: KollectProfile
metadata:
  name: helmrelease-profile
  namespace: default
spec:
  targetGVK:
    group: ""
    version: v1
    kind: Secret
  attributes:
    - name: chart
      path: "helm:release.chartName"
---
apiVersion: kollect.dev/v1alpha1
kind: KollectTarget
metadata:
  name: helmrelease-target
  namespace: default
spec:
  profileRef: helmrelease-profile

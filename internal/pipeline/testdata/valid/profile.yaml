apiVersion: kollect.dev/v1alpha1
kind: KollectProfile
metadata:
  name: helmrelease-profile
  namespace: default
spec:
  targetGVK:
    group: ""
    version: v1
    kind: Secret
  attributes:
    - name: chart
      path: "helm:release.chartName"
    - name: version
      path: "helm:release.chartVersion"

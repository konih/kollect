# markdownlint-cli2 config — covers every Markdown file in the repository.
# MkDocs-friendly: allow mermaid/HTML; relax rules that fight tables, ADRs, git-cliff output.
config:
  default: true
  MD013: false
  MD033: false
  MD041: false
  MD024:
    siblings_only: true
  MD025: false
  MD040: false
  MD029: false
  MD060: false
  MD036: false
  MD022: false
  MD030: false
  MD045: false
  MD001: false
  MD007: false
  MD034: false
  MD051: false
  MD014: false
  MD003: false
  MD050: false
  MD059: false

overrides:
  # git-cliff intentionally separates generated release groups with two blank lines.
  - filter:
      - CHANGELOG.md
    config:
      MD012: false
    combine: merge

globs:
  - "**/*.md"

ignores:
  - site/**
  - vendor/**
  - references/**
  - agent-context/**
  - .mkdocs-venv/**
  - docs/node_modules/**

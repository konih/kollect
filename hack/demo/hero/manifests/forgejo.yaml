# In-cluster Forgejo for offline hero demos — no external GitHub tokens.
apiVersion: v1
kind: Namespace
metadata:
  name: forgejo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/part-of: kollect-hero-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo
    spec:
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:11
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: FORGEJO__database__DB_TYPE
              value: sqlite3
            - name: FORGEJO__database__PATH
              value: /data/gitea.db
            - name: FORGEJO__server__DOMAIN
              value: forgejo.forgejo.svc.cluster.local
            - name: FORGEJO__server__ROOT_URL
              value: http://forgejo.forgejo.svc.cluster.local:3000/
            - name: FORGEJO__server__HTTP_PORT
              value: "3000"
            - name: FORGEJO__server__LFS_START_SERVER
              value: "false"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app.kubernetes.io/name: forgejo
spec:
  selector:
    app.kubernetes.io/name: forgejo
  ports:
    - name: http
      port: 3000
      targetPort: http

#
# Apply before Targets. Reuses deployment/service patterns from config/samples/; adds ConfigMap,
# CronJob, and KollectTarget meta profiles for the five-GVK wide-scope demo.
---
apiVersion: kollect.dev/v1alpha1
kind: KollectProfile
metadata:
  name: deployment-fleet
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/part-of: kollect-demo
spec:
  targetGVK:
    group: apps
    version: v1
    kind: Deployment
  attributes:
    - name: replicas
      path: '$.spec.replicas'
      type: int
    - name: image
      path: '$.spec.template.spec.containers[0].image'
      type: string
    - name: images
      path: '$.spec.template.spec.containers[*].image'
      type: list
    - name: labels
      path: '$.metadata.labels'
      type: map
      optional: true
---
apiVersion: kollect.dev/v1alpha1
kind: KollectProfile
metadata:
  name: service-endpoints
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/part-of: kollect-demo
spec:
  targetGVK:
    group: ""
    version: v1
    kind: Service
  attributes:
    - name: clusterIP
      path: '$.spec.clusterIP'
      type: string
    - name: ports
      path: '$.spec.ports[*].port'
      type: list
    - name: type
      path: '$.spec.type'
      type: string
---
apiVersion: kollect.dev/v1alpha1
kind: KollectProfile
metadata:
  name: configmap-data
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/part-of: kollect-demo
spec:
  targetGVK:
    group: ""
    version: v1
    kind: ConfigMap
  attributes:
    - name: keyCount
      path: "cel:size(object.data)"
      type: int
    - name: dataKeys
      path: '$.data'
      type: map
      optional: true
    - name: labels
      path: '$.metadata.labels'
      type: map
      optional: true
---
apiVersion: kollect.dev/v1alpha1
kind: KollectProfile
metadata:
  name: cronjob-schedule
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/part-of: kollect-demo
spec:
  targetGVK:
    group: batch
    version: v1
    kind: CronJob
  attributes:
    - name: schedule
      path: '$.spec.schedule'
      type: string
    - name: suspend
      path: '$.spec.suspend'
      type: bool
      optional: true
    - name: image
      path: '$.spec.jobTemplate.spec.template.spec.containers[0].image'
      type: string
    - name: labels
      path: '$.metadata.labels'
      type: map
      optional: true
---
apiVersion: kollect.dev/v1alpha1
kind: KollectProfile
metadata:
  name: kollect-target-meta
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/part-of: kollect-demo
spec:
  targetGVK:
    group: kollect.dev
    version: v1alpha1
    kind: KollectTarget
  attributes:
    - name: profileRef
      path: '$.spec.profileRef'
      type: string
    - name: suspend
      path: '$.spec.suspend'
      type: bool
    - name: watchMode
      path: '$.spec.watchMode'
      type: string
      optional: true
    - name: includedNamespaces
      path: '$.spec.includedNamespaces'
      type: list
      optional: true

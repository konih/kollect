# Collection ceiling for the wide-scope demo (ADR-0207). Targets in default must stay inside this cap.
---
apiVersion: kollect.dev/v1alpha1
kind: KollectScope
metadata:
  name: demo-wide-scope
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/part-of: kollect-demo
spec:
  allowedGVKs:
    - group: apps
      version: v1
      kind: Deployment
    - group: ""
      version: v1
      kind: Service
    - group: ""
      version: v1
      kind: ConfigMap
    - group: batch
      version: v1
      kind: CronJob
    - group: kollect.dev
      version: v1alpha1
      kind: KollectTarget
  allowedNamespaces: [team-a, team-b, platform, default, inventory-demo]
  deniedNamespaces: [kube-system, kube-public]

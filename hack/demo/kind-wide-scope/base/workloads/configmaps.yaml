# 6 ConfigMaps — collected by fleet-configmaps (label kollect.dev/config-track=true).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: team-a
  labels:
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/config-track: "true"
data:
  logLevel: info
  upstreamTimeout: 30s
  rateLimitRps: "100"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: feature-flags
  namespace: team-a
  labels:
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/config-track: "true"
data:
  newCheckout: "false"
  darkMode: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-env
  namespace: team-b
  labels:
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/config-track: "true"
data:
  API_BASE_URL: http://backend.team-b.svc.cluster.local
  CACHE_TTL: "300"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-tuning
  namespace: platform
  labels:
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/config-track: "true"
data:
  scrapeInterval: 15s
  retentionDays: "7"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: storefront-config
  namespace: default
  labels:
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/config-track: "true"
data:
  cacheControl: public,max-age=300
  featureBanner: enabled
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-labels
  namespace: default
  labels:
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/config-track: "true"
data:
  environment: kind-dev
  demo: wide-scope

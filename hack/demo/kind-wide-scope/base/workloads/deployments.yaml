---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: team-b
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/inventory: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:1.0
          args: ["-text=hello"]
---

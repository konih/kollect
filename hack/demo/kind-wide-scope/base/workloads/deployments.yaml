#
# 10 Deployments — collected by fleet-deployments (label kollect.dev/inventory=enabled).
# Images chosen to produce Trivy VulnerabilityReports (no deprecated nginx demo workloads).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: team-a
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/inventory: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: demo-fleet
    spec:
      containers:
        - name: gateway
          image: traefik/whoami:v1.10.2
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: team-a
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/inventory: enabled
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "while true; do sleep 3600; done"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-redis
  namespace: team-a
  labels:
    app.kubernetes.io/name: cache-redis
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/inventory: enabled
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cache-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cache-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: team-b
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/inventory: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:

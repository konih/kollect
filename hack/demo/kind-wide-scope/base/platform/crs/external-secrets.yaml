# ExternalSecret CRs — collected by fleet-external-secrets Target.
# team-a uses the fake provider (no cloud creds); team-b uses kubernetes provider.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: demo-fake-store
  namespace: team-a
spec:
  provider:
    fake:
      data:
        - key: api-key
          value: demo-api-key-team-a
          version: v1
        - key: webhook-secret
          value: demo-webhook-secret
          version: v1
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-gateway-credentials
  namespace: team-a
  labels:
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/inventory: enabled
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: demo-fake-store
    kind: SecretStore
  target:
    name: api-gateway-credentials
  data:
    - secretKey: api-key
      remoteRef:
        key: api-key
        version: v1
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: demo-k8s-store
  namespace: team-b
spec:
  provider:
    kubernetes:
      remoteNamespace: team-b
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: default
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-credentials
  namespace: team-b
  labels:
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/inventory: enabled
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: demo-k8s-store
    kind: SecretStore
  target:
    name: backend-credentials
  data:
    - secretKey: database-url
      remoteRef:
        key: platform-source-credentials
        property: database-url
    - secretKey: api-token
      remoteRef:
        key: platform-source-credentials
        property: api-token
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: demo-fake-store
  namespace: default
spec:
  provider:
    fake:
      data:
        - key: git-sync-token
          value: placeholder-sync-token
          version: v1
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: inventory-sync-credentials
  namespace: default
  labels:
    app.kubernetes.io/part-of: demo-fleet
    kollect.dev/inventory: enabled
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: demo-fake-store
    kind: SecretStore
  target:
    name: inventory-sync-credentials
  data:
    - secretKey: token
      remoteRef:
        key: git-sync-token
        version: v1

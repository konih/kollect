# Collection ceiling for the wide-scope demo (ADR-0207).
# Eight GVK types: core fleet + upstream security/TLS/secrets CRDs.
---
apiVersion: kollect.dev/v1alpha1
kind: KollectScope
metadata:
  name: demo-wide-scope
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/part-of: kollect-demo
spec:
  allowedGVKs:
    - group: apps
      version: v1
      kind: Deployment
    - group: ""
      version: v1
      kind: Service
    - group: ""
      version: v1
      kind: ConfigMap
    - group: batch
      version: v1
      kind: CronJob
    - group: kollect.dev
      version: v1alpha1
      kind: KollectTarget
    - group: aquasecurity.github.io
      version: v1alpha1
      kind: VulnerabilityReport
    - group: cert-manager.io
      version: v1
      kind: Certificate
    - group: external-secrets.io
      version: v1beta1
      kind: ExternalSecret
  allowedNamespaces: [team-a, team-b, platform, default, inventory-demo, sec-ops]
  deniedNamespaces: [kube-system, kube-public]

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: team-a
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: demo-fleet
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: storefront-demo
  namespace: default
  labels:
    app.kubernetes.io/name: storefront
    app.kubernetes.io/part-of: demo-fleet
spec:
  selector:
    app.kubernetes.io/name: storefront
  ports:
    - port: 80
      targetPort: 80

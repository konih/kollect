# Step 5 — external-secrets sync posture (status only — never secret values).
---
apiVersion: kollect.dev/v1alpha1
kind: KollectProfile
metadata:
  name: external-secret-summary
  namespace: default
spec:
  targetGVK: {group: external-secrets.io, version: v1beta1, kind: ExternalSecret}
  attributes:
    - {name: secretStore, path: '$.spec.secretStoreRef.name', type: string}
    - {name: targetSecret, path: '$.spec.target.name', type: string, optional: true}
    - {name: refreshInterval, path: '$.spec.refreshInterval', type: string, optional: true}
    - {name: synced, path: '$.status.conditions[0].status', type: string, optional: true}

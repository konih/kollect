# Step 1 — KollectScope: multi-tenant collection ceiling (ADR-0207).
# Teams in `default` namespace own Targets; Scope gates which GVKs and namespaces may export.
# Wide-scope demo allows 8 GVK types including upstream security/TLS/secrets CRDs.
---
apiVersion: kollect.dev/v1alpha1
kind: KollectScope
metadata:
  name: demo-wide-scope
  namespace: default
  labels:
    app.kubernetes.io/part-of: kollect-demo
spec:
  allowedGVKs:
    # Core fleet
    - {group: apps, version: v1, kind: Deployment}
    - {group: "", version: v1, kind: Service}
    - {group: "", version: v1, kind: ConfigMap}
    - {group: batch, version: v1, kind: CronJob}
    - {group: kollect.dev, version: v1alpha1, kind: KollectTarget}
    # Upstream platform CRDs (installed by install-platform.sh)
    - {group: aquasecurity.github.io, version: v1alpha1, kind: VulnerabilityReport}
    - {group: cert-manager.io, version: v1, kind: Certificate}
    - {group: external-secrets.io, version: v1beta1, kind: ExternalSecret}
  allowedNamespaces: [team-a, team-b, platform, default, inventory-demo, sec-ops]
  deniedNamespaces: [kube-system, kube-public]

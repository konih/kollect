# 4 CronJobs — collected by fleet-cronjobs (labels below).
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-cleanup
  namespace: team-a
  labels:
    app.kubernetes.io/name: nightly-cleanup
    app.kubernetes.io/part-of: demo-fleet
    app.kubernetes.io/component: cronjob
    kollect.dev/inventory: enabled
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: busybox:1.36
              command: ["sh", "-c", "echo cleanup && date"]
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: weekly-report
  namespace: team-b
  labels:
    app.kubernetes.io/name: weekly-report
    app.kubernetes.io/part-of: demo-fleet
    app.kubernetes.io/component: cronjob
    kollect.dev/inventory: enabled
spec:
  schedule: "0 6 * * 1"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: report
              image: busybox:1.36
              command: ["sh", "-c", "echo weekly-report"]
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cert-rotate-check
  namespace: platform
  labels:
    app.kubernetes.io/name: cert-rotate-check
    app.kubernetes.io/part-of: demo-fleet
    app.kubernetes.io/component: cronjob
    kollect.dev/inventory: enabled
spec:
  schedule: "30 4 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cert-check
              image: busybox:1.36
              command: ["sh", "-c", "echo cert-check"]
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: inventory-prune
  namespace: default
  labels:
    app.kubernetes.io/name: inventory-prune
    app.kubernetes.io/part-of: demo-fleet
    app.kubernetes.io/component: cronjob
    kollect.dev/inventory: enabled
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: prune
              image: busybox:1.36
              command: ["sh", "-c", "echo prune-stale-rows"]

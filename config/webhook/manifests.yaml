---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kollect-dev-v1alpha1-kollecthub
  failurePolicy: Fail
  name: vkollecthub.kb.io
  rules:
  - apiGroups:
    - kollect.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - kollecthubs
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kollect-dev-v1alpha1-kollectprofile
  failurePolicy: Fail
  name: vkollectprofile.kb.io
  rules:
  - apiGroups:
    - kollect.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - kollectprofiles
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kollect-dev-v1alpha1-kollectremotecluster
  failurePolicy: Fail
  name: vkollectremotecluster.kb.io
  rules:
  - apiGroups:
    - kollect.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - kollectremoteclusters
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kollect-dev-v1alpha1-kollectscope
  failurePolicy: Fail
  name: vkollectscope.kb.io
  rules:
  - apiGroups:
    - kollect.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - kollectscopes
  sideEffects: None

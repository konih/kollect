# Sink credentials from the CI environment ("secretRef.env" binding): this committed
# manifest carries no real secret — a stringData value that is exactly ${env:VAR} is
# substituted from the environment when kollect-pipeline resolves the sink's secretRef.
# Set KOLLECT_GIT_TOKEN as a masked/protected CI variable (GitLab: Settings > CI/CD >
# Variables; GitHub Actions: a repository secret exported into the job env). An unset or
# empty variable fails the run with an error naming the secret, key, and variable.
#
# Literal values (base64 data or plain stringData) still work; only values that are
# exactly one ${env:VAR} placeholder are substituted.
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: kollect-system
stringData:
  token: ${env:KOLLECT_GIT_TOKEN}

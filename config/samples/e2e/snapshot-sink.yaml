# kind e2e: minimal KollectSnapshotSink (git) — connectionTest off; export may degrade without credentials.
apiVersion: kollect.dev/v1alpha1
kind: KollectSnapshotSink
metadata:
  name: e2e-snapshot-sink
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/managed-by: kustomize
spec:
  type: git
  endpoint: https://github.com/konih/kollect-inventory-demo.git
  connectionTest: false
  git:
    branch: main
    pushPolicy: Commit
    commitMessage: "chore(e2e): inventory export"

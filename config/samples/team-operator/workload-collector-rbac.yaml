# Grant the team operator ServiceAccount permission to list/watch target GVKs.
# Replace subject name with your Helm release ServiceAccount (default: <release>).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kollect-workload-reader
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/managed-by: kustomize
rules:
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kollect-team-workload-reader
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/managed-by: kustomize
subjects:
  - kind: ServiceAccount
    name: kollect-team
    namespace: team-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kollect-workload-reader

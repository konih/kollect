apiVersion: kollect.dev/v1alpha1
kind: KollectSink
metadata:
  name: gitlab-inventory
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/managed-by: kustomize
spec:
  type: gitlab
  endpoint: https://gitlab.example.com/platform/kollect-inventory.git
  connectionTest: true
  # secretRef:
  #   name: gitlab-push-token
  #   namespace: kollect-system
  tls:
    caSecretRef:
      name: gitlab-internal-ca
      namespace: kollect-system

apiVersion: kollect.dev/v1alpha1
kind: KollectSink
metadata:
  name: parquet-inventory-demo
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/managed-by: kustomize
spec:
  type: s3
  cluster: kind-kollect-dev
  endpoint: s3://inventory-bucket/inventory
  connectionTest: true
  secretRef:
    name: s3-credentials
    namespace: kollect-system
  objectStore:
    format: parquet
    hotAttributes:
      - image
      - version

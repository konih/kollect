# Dual-cadence export (ADR-0413): Postgres portal @ 30s + Git audit @ 1h.
apiVersion: kollect.dev/v1alpha1
kind: KollectInventory
metadata:
  name: team-inventory
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/managed-by: kustomize
spec:
  exportMinInterval: 30s
  databaseSinkRefs:
    - postgres-inventory-demo
  snapshotSinkRefs:
    - name: git-inventory-demo
      exportMinInterval: 1h
  suspend: false

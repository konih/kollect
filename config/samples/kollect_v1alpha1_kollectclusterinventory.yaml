apiVersion: kollect.dev/v1alpha1
kind: KollectClusterInventory
metadata:
  name: platform-rollup
spec:
  targetRefs:
    - platform-argo-applications
  namespaces:
    - team-a
    - team-b
  namespaceSelector:
    matchLabels:
      kollect.dev/tenant: platform
  # sinkNamespace is the default namespace for sink refs that omit a namespace.
  sinkNamespace: kollect-system
  databaseSinkRefs:
    # resolves in sinkNamespace (kollect-system)
    - name: postgres
  snapshotSinkRefs:
    # explicit cross-namespace export to a sink owned by team-a
    - name: team-git
      namespace: team-a

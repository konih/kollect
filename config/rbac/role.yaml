---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - kollect.dev
  resources:
  - kollectinventories
  - kollecttargets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kollect.dev
  resources:
  - kollectinventories/finalizers
  - kollecttargets/finalizers
  verbs:
  - update
- apiGroups:
  - kollect.dev
  resources:
  - kollectinventories/status
  - kollecttargets/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - kollect.dev
  resources:
  - kollectprofiles
  verbs:
  - get
  - list
  - watch

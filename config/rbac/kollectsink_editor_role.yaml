# This rule is not used by the project kollect itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kollect.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/managed-by: kustomize
  name: kollectsink-editor-role
rules:
- apiGroups:
  - kollect.dev
  resources:
  - kollectsinks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kollect.dev
  resources:
  - kollectsinks/status
  verbs:
  - get

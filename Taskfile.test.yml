# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

set:
  - pipefail

run: once

env:
  GOTOOLCHAIN:
    sh: echo "go$(sed -n 's/^go //p' go.mod | head -1)"

tasks:
  run:
    desc: Run unit tests (excludes e2e), with race detector
    env:
      CGO_ENABLED: "1"
    cmds:
      - make test

  coverage:
    desc: Unit/envtest with internal/ coverage.out and floor (COVERAGE_MIN, default 45)
    env:
      CGO_ENABLED: "1"
    cmds:
      - bash hack/coverage.sh

  coverage:report:
    desc: Print go tool cover -func summary from coverage.out
    cmds:
      - |
        if [ ! -s coverage.out ]; then
          echo "coverage.out missing; run task coverage first" >&2
          exit 1
        fi
      - go tool cover -func=coverage.out | tee coverage-summary.txt

  coverage:html:
    desc: Generate coverage.html from coverage.out (run task coverage first)
    cmds:
      - |
        if [ ! -s coverage.out ]; then
          echo "coverage.out missing; run task coverage first" >&2
          exit 1
        fi
      - go tool cover -html=coverage.out -o coverage.html
      - echo "wrote coverage.html"

  e2e:
    desc: Run kind e2e smoke (setup, smoke, teardown — CI parity with e2e-nightly)
    env:
      CGO_ENABLED: "1"
      CLUSTER_NAME:
        sh: echo "${CLUSTER_NAME:-kollect-e2e}"
    cmds:
      - bash hack/kind/e2e/setup.sh
      - bash hack/kind/e2e/smoke.sh
      - defer: bash hack/kind/e2e/teardown.sh

  bench:
    desc: Run Go micro-benchmarks (-short, -benchmem); safe for dev/CI
    env:
      CGO_ENABLED: "1"
    cmds:
      - mkdir -p artifacts/bench
      - |
        stamp="$(date -u +%Y%m%dT%H%M%SZ)"
        out="artifacts/bench/${stamp}.txt"
        go test -short -bench=. -benchmem ./internal/collect/... 2>&1 | tee "$out"
        cp "$out" artifacts/bench/latest.txt
        echo "wrote $out"

  load-test:
    desc: Opt-in bounded load tests (KOLECT_LOAD_TEST=1, max 2000 objects); not in default test
    env:
      CGO_ENABLED: "1"
    cmds:
      - |
        if [ "${KOLECT_LOAD_TEST:-}" != "1" ]; then
          echo "Refusing load test: set KOLECT_LOAD_TEST=1 to opt in (max 2000 synthetic objects)." >&2
          exit 1
        fi
      - go test -tags=load -count=1 -timeout=15m ./test/load/...

# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

set:
  - pipefail

run: once

env:
  GOTOOLCHAIN:
    sh: echo "go$(sed -n 's/^go //p' go.mod | head -1)"

tasks:
  run:
    desc: Run unit tests (excludes e2e), with race detector
    env:
      CGO_ENABLED: "1"
    cmds:
      - make test

  e2e:
    desc: Run end-to-end tests (requires kind cluster; optional in CI)
    env:
      CGO_ENABLED: "1"
      KIND_CLUSTER:
        sh: echo "${KIND_CLUSTER:-kollect-test-e2e}"
    cmds:
      - make test-e2e

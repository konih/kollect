# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

set:
  - pipefail

run: once

env:
  CGO_ENABLED: "0"
  GOTOOLCHAIN:
    sh: echo "go$(sed -n 's/^go //p' go.mod | head -1)"

vars:
  BIN_DIR: bin
  MANAGER_BINARY: "{{.BIN_DIR}}/manager"
  DOCKER_IMAGE: kollect-controller-manager:dev
  CLUSTER_NAME:
    sh: echo "${CLUSTER_NAME:-kollect-smoke}"

includes:
  test:
    taskfile: ./Taskfile.test.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  install:
    desc: Download and verify Go module dependencies
    cmds:
      - go mod download
      - go mod verify

  build:
    desc: Build the manager binary
    deps: [install]
    cmds:
      - go build -ldflags="-w -s" -o {{.MANAGER_BINARY}} ./cmd/main.go
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.MANAGER_BINARY}}"

  build:kollect:
    desc: Build the kollect developer CLI (create-remote-secret stub)
    deps: [install]
    cmds:
      - go build -ldflags="-w -s" -o {{.BIN_DIR}}/kollect ./cmd/kollect
    sources:
      - cmd/kollect/**/*.go
      - internal/remotesecret/**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BIN_DIR}}/kollect"

  manifests:
    desc: Generate CRDs, RBAC, and webhook configuration
    cmds:
      - make manifests

  generate:
    desc: Generate deepcopy and other codegen
    cmds:
      - make generate

  verify:
    desc: Fail if generated artifacts (manifests, deepcopy, RBAC) are stale
    deps: [install]
    cmds:
      - bash hack/verify.sh

  scrub:
    desc: Fail if staged files contain forbidden company/legacy strings
    cmds:
      - bash hack/scrub.sh

  lint:
    desc: Run golangci-lint v2
    deps: [install]
    cmds:
      - make lint

  test:
    desc: Run unit tests with envtest (alias for test:run)
    cmds:
      - task: test:run

  bench:
    desc: Run Go micro-benchmarks (-short, -benchmem)
    cmds:
      - task: test:bench

  load-test:
    desc: Opt-in bounded load tests (requires KOLECT_LOAD_TEST=1)
    cmds:
      - task: test:load-test

  perf-report:
    desc: Local perf snapshot via hack/perf-report.sh (see DEVELOPMENT.md)
    env:
      CGO_ENABLED: "1"
    cmds:
      - bash hack/perf-report.sh

  test-integration:
    desc: Run integration-tagged tests (testcontainers; requires Docker)
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test -tags=integration -count=1 ./internal/sink/... ./internal/transport/... ./internal/hub/...

  format:
    desc: Run go fmt on all packages
    cmds:
      - go fmt ./...

  format:check:
    desc: Fail if gofmt would change any file
    cmds:
      - test -z "$(gofmt -l . | grep -v '^$' || true)"

  docker:build:
    desc: Build the controller-manager container image
    deps: [build]
    cmds:
      - "{{.CONTAINER_TOOL | default `docker`}} build -t {{.DOCKER_IMAGE}} ."

  install:crds:
    desc: Apply CRD manifests to the cluster
    cmds:
      - kubectl apply --server-side -f config/crd/bases

  deploy:operator:
    desc: Deploy operator manifests (assumes image is available)
    cmds:
      - |
        cd config/manager && "{{.TASKFILE_DIR}}/bin/kustomize" edit set image controller={{.DOCKER_IMAGE}}
      - kubectl apply -k config/default

  changelog:
    desc: Preview unreleased changelog (requires git-cliff in PATH or bin/)
    cmds:
      - git-cliff --config cliff.toml --unreleased

  helm-lint:
    desc: Lint the kollect Helm chart
    cmds:
      - helm lint charts/kollect

  helm-unittest:
    desc: Run helm-unittest on charts/kollect
    cmds:
      - helm unittest charts/kollect

  helm-test:
    desc: Lint chart and run helm-unittest
    cmds:
      - task: helm-lint
      - task: helm-unittest

  kind-dev-up:
    desc: Create kollect-dev kind cluster (operator + optional dev addons)
    cmds:
      - bash hack/kind/dev/setup.sh

  kind-dev-down:
    desc: Delete kollect-dev kind cluster
    cmds:
      - bash hack/kind/dev/teardown.sh

  kind-dev-load:
    desc: Build and load controller image into kollect-dev
    cmds:
      - bash hack/kind/common.sh load-image kollect-dev

  kind-dev-status:
    desc: Show kollect-dev cluster and addon status
    cmds:
      - bash hack/kind/dev/status.sh

  kind-e2e-up:
    desc: Create minimal kollect-e2e cluster and install operator (CI parity)
    cmds:
      - bash hack/kind/e2e/setup.sh

  kind-e2e-down:
    desc: Delete kollect-e2e kind cluster
    cmds:
      - bash hack/kind/e2e/teardown.sh

# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

set:
  - pipefail

run: once

env:
  CGO_ENABLED: "0"
  GOTOOLCHAIN:
    sh: echo "go$(sed -n 's/^go //p' go.mod | head -1)"

vars:
  BIN_DIR: bin
  # renovate: datasource=github-releases depName=orhun/git-cliff
  GIT_CLIFF_VERSION: v2.13.1
  GIT_CLIFF_BIN: "{{.BIN_DIR}}/git-cliff"
  CLIFF_CONFIG: hack/release/cliff.toml
  GO_ARCH_LINT_CONFIG: hack/tooling/go-arch-lint.yml
  MARKDOWNLINT_CONFIG: hack/tooling/markdownlint-cli2.yaml
  # renovate: datasource=github-releases depName=fe3dback/go-arch-lint
  GO_ARCH_LINT_VERSION: v1.15.0
  # renovate: datasource=github-releases depName=helm/helm
  HELM_VERSION: v3.17.3
  # renovate: datasource=github-releases depName=norwoodj/helm-docs
  HELM_DOCS_VERSION: v1.14.2
  HELM_DOCS_BIN: "{{.BIN_DIR}}/helm-docs"
  COVERAGE_MIN: "65"
  MANAGER_BINARY: "{{.BIN_DIR}}/manager"
  DOCKER_IMAGE: kollect-controller-manager:dev
  CLUSTER_NAME:
    sh: echo "${CLUSTER_NAME:-kollect-smoke}"

includes:
  test:
    taskfile: ./hack/task/Taskfile.test.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  install:
    desc: Download and verify Go module dependencies
    cmds:
      - go mod download
      - go mod verify

  build:
    desc: Build the manager binary
    deps: [install]
    cmds:
      - go build -ldflags="-w -s" -o {{.MANAGER_BINARY}} ./cmd/main.go
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.MANAGER_BINARY}}"

  build:kollect:
    desc: Build the kollect developer CLI (create-remote-secret stub)
    deps: [install]
    cmds:
      - go build -ldflags="-w -s" -o {{.BIN_DIR}}/kollect ./cmd/kollect
    sources:
      - cmd/kollect/**/*.go
      - internal/remotesecret/**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BIN_DIR}}/kollect"

  manifests:
    desc: Generate CRDs, RBAC, and webhook configuration
    cmds:
      - make manifests

  generate:
    desc: Generate deepcopy and other codegen
    cmds:
      - make generate

  verify:
    desc: Fail if generated artifacts (manifests, deepcopy, RBAC) are stale
    deps: [install]
    cmds:
      - bash hack/verify.sh

  verify:headers:
    desc: Fail if ui/src files lack SPDX + copyright headers
    cmds:
      - bash hack/verify-ui-headers.sh

  scrub:
    desc: Fail if staged files contain forbidden company/legacy strings
    cmds:
      - bash hack/scrub.sh

  audit:rbac:
    desc: Audit rendered RBAC for dangerous permissions (Polaris + kubeaudit)
    cmds:
      - bash hack/audit-rbac.sh

  arch-lint:
    desc: Enforce internal/ package dependency graph (go-arch-lint)
    deps: [install]
    cmds:
      - go run -mod=mod github.com/fe3dback/go-arch-lint@{{.GO_ARCH_LINT_VERSION}} check --arch-file {{.GO_ARCH_LINT_CONFIG}}

  lint:
    desc: Run golangci-lint v2 and go-arch-lint
    deps: [install]
    cmds:
      - make lint
      - task: arch-lint

  lint:markdown:
    desc: Lint Markdown docs with markdownlint-cli2
    cmds:
      - npm ci --prefix docs
      - docs/node_modules/.bin/markdownlint-cli2 --config {{.MARKDOWNLINT_CONFIG}}

  lint:shell:
    desc: Lint shell scripts with ShellCheck v0.11.0
    cmds:
      - bash hack/lint-shell.sh

  vulncheck:
    desc: Scan for known Go vulnerabilities (govulncheck)
    deps: [install]
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  test:
    desc: Run unit tests with envtest (alias for test:run)
    cmds:
      - task: test:run

  coverage:
    desc: Run unit tests and export coverage.out (internal/ floor enforced)
    env:
      COVERAGE_MIN: "{{.COVERAGE_MIN}}"
    cmds:
      - task: test:coverage

  coverage:report:
    desc: Print coverage func summary from coverage.out
    cmds:
      - task: test:coverage:report

  coverage:html:
    desc: Generate coverage.html from coverage.out
    cmds:
      - task: test:coverage:html

  coverage:race:
    desc: Local-only coverage with race detector (COVERAGE_RACE=1; not run in CI)
    env:
      COVERAGE_MIN: "{{.COVERAGE_MIN}}"
    cmds:
      - task: test:coverage:race

  sonar:
    desc: Run SonarCloud scan locally (alias for sonar:local)
    cmds:
      - task: sonar:local

  sonar:local:
    desc: Run SonarCloud scan locally (SONARCLOUD_TOKEN in .envrc via direnv)
    preconditions:
      - sh: test -n "${SONARCLOUD_TOKEN}"
        msg: "SONARCLOUD_TOKEN unset — add to .envrc and run direnv allow (see docs/development/tooling-setup.md)"
    cmds:
      - task: coverage
      - |
        {{.CONTAINER_TOOL | default `docker`}} run --rm \
          -e SONAR_HOST_URL="https://sonarcloud.io" \
          -e SONAR_TOKEN="${SONARCLOUD_TOKEN}" \
          -v "${PWD}:/usr/src" \
          sonarsource/sonar-scanner-cli:latest

  bench:
    desc: Run Go micro-benchmarks (-short, -benchmem)
    cmds:
      - task: test:bench

  load-test:
    desc: Opt-in bounded load tests (requires KOLECT_LOAD_TEST=1)
    cmds:
      - task: test:load-test

  perf-report:
    desc: Local perf snapshot via hack/perf-report.sh (see DEVELOPMENT.md)
    env:
      CGO_ENABLED: "1"
    cmds:
      - bash hack/perf-report.sh

  test-integration:
    desc: Run integration-tagged tests (testcontainers; requires Docker)
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test -tags=integration -count=1 ./internal/sink/... ./internal/transport/... ./internal/hub/...

  format:
    desc: Run go fmt on all packages
    cmds:
      - go fmt ./...

  format:check:
    desc: Fail if gofmt or goimports would change any file
    deps: [install]
    cmds:
      - test -z "$(gofmt -l . | grep -v '^$' || true)"
      - make golangci-lint
      - test -z "$(bin/golangci-lint fmt --diff 2>/dev/null | grep -v '^$' || true)"

  docker:build:
    desc: Build the controller-manager container image
    deps: [build]
    cmds:
      - "{{.CONTAINER_TOOL | default `docker`}} build -t {{.DOCKER_IMAGE}} ."

  install:crds:
    desc: Apply CRD manifests to the cluster
    cmds:
      - kubectl apply --server-side -f config/crd/bases

  deploy:operator:
    desc: Deploy operator manifests (assumes image is available)
    cmds:
      - |
        cd config/manager && "{{.TASKFILE_DIR}}/bin/kustomize" edit set image controller={{.DOCKER_IMAGE}}
      - kubectl apply -k config/default

  tools:git-cliff:
    desc: Download pinned git-cliff binary ({{.GIT_CLIFF_VERSION}})
    status:
      - test -x {{.GIT_CLIFF_BIN}}
    cmds:
      - bash hack/install-git-cliff.sh {{.GIT_CLIFF_VERSION}} {{.GIT_CLIFF_BIN}}

  changelog:
    desc: Preview unreleased changelog section (stdout)
    deps: [tools:git-cliff]
    cmds:
      - "{{.GIT_CLIFF_BIN}} --config {{.CLIFF_CONFIG}} --unreleased"

  changelog:write:
    desc: Regenerate CHANGELOG.md from git tags and unreleased commits
    deps: [tools:git-cliff]
    cmds:
      - "{{.GIT_CLIFF_BIN}} --config {{.CLIFF_CONFIG}} -o CHANGELOG.md"

  changelog:release:
    desc: Print changelog section for the latest tag (release notes)
    deps: [tools:git-cliff]
    cmds:
      - "{{.GIT_CLIFF_BIN}} --config {{.CLIFF_CONFIG}} --latest"

  changelog:verify:
    desc: Fail if CHANGELOG.md is stale (CI/preflight)
    deps: [tools:git-cliff]
    cmds:
      - bash hack/verify-changelog.sh

  release-dry-run:
    desc: Build dist/ release assets locally without pushing (VERSION=0.0.0-dry-run)
    vars:
      RELEASE_VERSION:
        sh: echo "${VERSION:-0.0.0-dry-run}"
      IMAGE_REPO:
        sh: echo "${IMAGE_REPO:-ghcr.io/konih/kollect}"
    cmds:
      - bash hack/release-assets.sh "{{.RELEASE_VERSION}}" "{{.IMAGE_REPO}}"
      - echo "release assets in dist/ (image tag not pushed)"

  tools:helm-docs:
    desc: Download pinned helm-docs binary ({{.HELM_DOCS_VERSION}})
    status:
      - test -x {{.HELM_DOCS_BIN}}
    cmds:
      - bash hack/install-helm-docs.sh {{.HELM_DOCS_VERSION}} {{.HELM_DOCS_BIN}}

  helm-docs:
    desc: Regenerate charts/kollect/README.md from values.yaml
    deps: [tools:helm-docs]
    cmds:
      - "{{.HELM_DOCS_BIN}} --chart-search-root charts/kollect"
    sources:
      - charts/kollect/values.yaml
      - charts/kollect/Chart.yaml
      - charts/kollect/README.md.gotmpl
      - .helm-docs.yaml
    generates:
      - charts/kollect/README.md

  helm-docs:verify:
    desc: Fail if charts/kollect/README.md is stale (CI/helm-test)
    deps: [tools:helm-docs]
    cmds:
      - bash hack/verify-helm-docs.sh

  helm-lint:
    desc: Lint the kollect Helm chart
    cmds:
      - helm lint charts/kollect

  helm-unittest:
    desc: Run helm-unittest on charts/kollect
    cmds:
      - helm unittest charts/kollect

  helm-test:
    desc: Lint chart, verify helm-docs drift, run helm-unittest
    cmds:
      - task: helm-lint
      - task: helm-docs:verify
      - task: helm-unittest

  ui-dev:
    desc: Start kollect-ui dev server with MSW mock Read API (VITE_MOCK_API=true)
    dir: ui
    env:
      VITE_MOCK_API: "true"
    cmds:
      - npm ci
      - npm run dev

  ui-mock-prism:
    desc: Start Prism mock HTTP server for Read API contract (port 4010)
    cmds:
      - npm ci --prefix ui
      - npx --prefix ui @stoplight/prism-cli mock openapi/v1alpha1/inventory.yaml -p 4010

  build-ui:
    desc: Build the kollect-ui SPA to ui/dist
    dir: ui
    cmds:
      - npm ci
      - npm run build
    sources:
      - ui/src/**/*
      - ui/package.json
      - ui/package-lock.json
      - ui/vite.config.ts
    generates:
      - ui/dist/index.html

  ui-ci:
    desc: UI verify gate — typecheck, unit tests, lint, build
    cmds:
      - bash hack/ci/ui-verify.sh

  ui-mock-sync:
    desc: Regenerate MSW OpenAPI drift manifest (Phase 2)
    cmds:
      - bash hack/ui-mock-sync.sh

  ui-e2e:
    desc: Run Playwright smoke tests (MSW dev server)
    dir: ui
    env:
      VITE_MOCK_API: "true"
      PLAYWRIGHT_HOST_PLATFORM_OVERRIDE: ubuntu24.04-x64
    cmds:
      - npm ci
      - npx playwright install chromium
      - npx playwright test

  ui-e2e:docker:
    desc: Run Playwright smoke tests in Docker (Ubuntu 26.04 host workaround)
    cmds:
      - bash hack/ui-e2e-docker.sh

  dev-up:
    desc: Bootstrap local dev — build, kind cluster, sample CRs
    cmds:
      - task: build
      - task: kind-dev-up
      - kubectl apply -k config/samples/

  kind-dev-up:
    desc: Create kollect-dev kind cluster (operator + optional dev addons)
    cmds:
      - bash hack/kind/dev/setup.sh

  kind-dev-down:
    desc: Delete kollect-dev kind cluster
    cmds:
      - bash hack/kind/dev/teardown.sh

  demo-check:
    desc: Verify wide-scope kind demo prerequisites
    cmds:
      - bash hack/demo/kind-wide-scope/demo.sh --check

  kind-dev-load:
    desc: Build and load controller image into kollect-dev
    cmds:
      - bash hack/kind/common.sh load-image kollect-dev

  kind-dev-status:
    desc: Show kollect-dev cluster and addon status
    cmds:
      - bash hack/kind/dev/status.sh

  kind-e2e-up:
    desc: Create minimal kollect-e2e cluster and install operator (CI parity)
    cmds:
      - bash hack/kind/e2e/setup.sh

  kind-e2e-down:
    desc: Delete kollect-e2e kind cluster
    cmds:
      - bash hack/kind/e2e/teardown.sh

# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

set:
  - pipefail

run: once

env:
  CGO_ENABLED: "0"
  GOTOOLCHAIN:
    sh: echo "go$(sed -n 's/^go //p' go.mod | head -1)"

vars:
  BIN_DIR: bin
  # renovate: datasource=github-releases depName=orhun/git-cliff
  GIT_CLIFF_VERSION: v2.13.1
  GIT_CLIFF_BIN: "{{.BIN_DIR}}/git-cliff"
  MANAGER_BINARY: "{{.BIN_DIR}}/manager"
  DOCKER_IMAGE: kollect-controller-manager:dev
  CLUSTER_NAME:
    sh: echo "${CLUSTER_NAME:-kollect-smoke}"

includes:
  test:
    taskfile: ./Taskfile.test.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  install:
    desc: Download and verify Go module dependencies
    cmds:
      - go mod download
      - go mod verify

  build:
    desc: Build the manager binary
    deps: [install]
    cmds:
      - go build -ldflags="-w -s" -o {{.MANAGER_BINARY}} ./cmd/main.go
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.MANAGER_BINARY}}"

  build:kollect:
    desc: Build the kollect developer CLI (create-remote-secret stub)
    deps: [install]
    cmds:
      - go build -ldflags="-w -s" -o {{.BIN_DIR}}/kollect ./cmd/kollect
    sources:
      - cmd/kollect/**/*.go
      - internal/remotesecret/**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BIN_DIR}}/kollect"

  manifests:
    desc: Generate CRDs, RBAC, and webhook configuration
    cmds:
      - make manifests

  generate:
    desc: Generate deepcopy and other codegen
    cmds:
      - make generate

  verify:
    desc: Fail if generated artifacts (manifests, deepcopy, RBAC) are stale
    deps: [install]
    cmds:
      - bash hack/verify.sh

  scrub:
    desc: Fail if staged files contain forbidden company/legacy strings
    cmds:
      - bash hack/scrub.sh

  lint:
    desc: Run golangci-lint v2
    deps: [install]
    cmds:
      - make lint

  vulncheck:
    desc: Scan for known Go vulnerabilities (govulncheck)
    deps: [install]
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  test:
    desc: Run unit tests with envtest (alias for test:run)
    cmds:
      - task: test:run

  coverage:
    desc: Run unit tests and export coverage.out (internal/ floor enforced)
    cmds:
      - task: test:coverage

  coverage:report:
    desc: Print coverage func summary from coverage.out
    cmds:
      - task: test:coverage:report

  coverage:html:
    desc: Generate coverage.html from coverage.out
    cmds:
      - task: test:coverage:html

  bench:
    desc: Run Go micro-benchmarks (-short, -benchmem)
    cmds:
      - task: test:bench

  load-test:
    desc: Opt-in bounded load tests (requires KOLECT_LOAD_TEST=1)
    cmds:
      - task: test:load-test

  perf-report:
    desc: Local perf snapshot via hack/perf-report.sh (see DEVELOPMENT.md)
    env:
      CGO_ENABLED: "1"
    cmds:
      - bash hack/perf-report.sh

  test-integration:
    desc: Run integration-tagged tests (testcontainers; requires Docker)
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test -tags=integration -count=1 ./internal/sink/... ./internal/transport/... ./internal/hub/...

  format:
    desc: Run go fmt on all packages
    cmds:
      - go fmt ./...

  format:check:
    desc: Fail if gofmt would change any file
    cmds:
      - test -z "$(gofmt -l . | grep -v '^$' || true)"

  docker:build:
    desc: Build the controller-manager container image
    deps: [build]
    cmds:
      - "{{.CONTAINER_TOOL | default `docker`}} build -t {{.DOCKER_IMAGE}} ."

  install:crds:
    desc: Apply CRD manifests to the cluster
    cmds:
      - kubectl apply --server-side -f config/crd/bases

  deploy:operator:
    desc: Deploy operator manifests (assumes image is available)
    cmds:
      - |
        cd config/manager && "{{.TASKFILE_DIR}}/bin/kustomize" edit set image controller={{.DOCKER_IMAGE}}
      - kubectl apply -k config/default

  tools:git-cliff:
    desc: Download pinned git-cliff binary ({{.GIT_CLIFF_VERSION}})
    status:
      - test -x {{.GIT_CLIFF_BIN}}
    cmds:
      - bash hack/install-git-cliff.sh {{.GIT_CLIFF_VERSION}} {{.GIT_CLIFF_BIN}}

  changelog:
    desc: Preview unreleased changelog section (stdout)
    deps: [tools:git-cliff]
    cmds:
      - "{{.GIT_CLIFF_BIN}} --config cliff.toml --unreleased"

  changelog:write:
    desc: Regenerate CHANGELOG.md from git tags and unreleased commits
    deps: [tools:git-cliff]
    cmds:
      - "{{.GIT_CLIFF_BIN}} --config cliff.toml -o CHANGELOG.md"

  changelog:release:
    desc: Print changelog section for the latest tag (release notes)
    deps: [tools:git-cliff]
    cmds:
      - "{{.GIT_CLIFF_BIN}} --config cliff.toml --latest"

  changelog:verify:
    desc: Fail if CHANGELOG.md is stale (CI/preflight)
    deps: [tools:git-cliff]
    cmds:
      - bash hack/verify-changelog.sh

  release-dry-run:
    desc: Build dist/ release assets locally without pushing (VERSION=0.0.0-dry-run)
    vars:
      RELEASE_VERSION:
        sh: echo "${VERSION:-0.0.0-dry-run}"
      IMAGE_REPO:
        sh: echo "${IMAGE_REPO:-ghcr.io/konih/kollect}"
    cmds:
      - bash hack/release-assets.sh "{{.RELEASE_VERSION}}" "{{.IMAGE_REPO}}"
      - echo "release assets in dist/ (image tag not pushed)"

  helm-lint:
    desc: Lint the kollect Helm chart
    cmds:
      - helm lint charts/kollect

  helm-unittest:
    desc: Run helm-unittest on charts/kollect
    cmds:
      - helm unittest charts/kollect

  helm-test:
    desc: Lint chart and run helm-unittest
    cmds:
      - task: helm-lint
      - task: helm-unittest

  dev-up:
    desc: Bootstrap local dev — build, kind cluster, sample CRs
    cmds:
      - task: build
      - task: kind-dev-up
      - kubectl apply -k config/samples/

  kind-dev-up:
    desc: Create kollect-dev kind cluster (operator + optional dev addons)
    cmds:
      - bash hack/kind/dev/setup.sh

  kind-dev-down:
    desc: Delete kollect-dev kind cluster
    cmds:
      - bash hack/kind/dev/teardown.sh

  kind-dev-load:
    desc: Build and load controller image into kollect-dev
    cmds:
      - bash hack/kind/common.sh load-image kollect-dev

  kind-dev-status:
    desc: Show kollect-dev cluster and addon status
    cmds:
      - bash hack/kind/dev/status.sh

  kind-e2e-up:
    desc: Create minimal kollect-e2e cluster and install operator (CI parity)
    cmds:
      - bash hack/kind/e2e/setup.sh

  kind-e2e-down:
    desc: Delete kollect-e2e kind cluster
    cmds:
      - bash hack/kind/e2e/teardown.sh

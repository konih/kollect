site_name: kollect
site_description: Kubernetes inventory export operator
site_url: https://konih.github.io/kollect/
repo_url: https://github.com/konih/kollect
repo_name: konih/kollect
copyright: Copyright &copy; 2026 Konrad Heimel

theme:
  name: material
  icon:
    logo: material/kubernetes
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

extra_css:
  - stylesheets/extra.css

nav:
  - Overview:
      - Home: index.md
  - Understand the Basics:
      - Architecture: ARCHITECTURE.md
      - Data flows: DATA-FLOWS.md
      - Platform decisions: PLATFORM-DECISIONS.md
  - Core Concepts:
      - CRD model: adr/0004-crd-model.md
      - CR reference: CR-REFERENCE.md
      - CEL and JSONPath extraction: adr/0003-cel-jsonpath-extraction.md
      - Sink backends: adr/0025-sink-backends-database-kafka.md
      - Hub and spoke: adr/0022-multi-cluster-sync-rfc.md
      - Multi-tenancy: adr/0016-namespaced-multi-tenancy.md
      - Namespaced profiles: adr/0031-namespaced-profiles.md
      - Watch labels: adr/0029-watch-labels.md
  - Getting Started:
      - Quick start: QUICKSTART.md
      - Development setup: DEVELOPMENT.md
      - Requirements: REQUIREMENTS.md
  - User Guide:
      - Examples:
          - Deployment inventory: examples/deployment-inventory.md
          - Helm release inventory: examples/helm-release-inventory.md
      - Connection test: adr/0030-connection-test.md
      - Performance tuning: PERFORMANCE.md
  - Reference:
      - Custom resources:
          - Overview: CR-REFERENCE.md
          - KollectProfile: crds/kollectprofile.md
          - KollectSink: crds/kollectsink.md
          - KollectTarget: crds/kollecttarget.md
          - KollectInventory: crds/kollectinventory.md
          - KollectScope: crds/kollectscope.md
          - KollectConnectionTest: crds/kollectconnectiontest.md
          - KollectClusterProfile: crds/kollectclusterprofile.md
          - KollectClusterTarget: crds/kollectclustertarget.md
          - KollectClusterInventory: crds/kollectclusterinventory.md
      - Inventory HTTP API: adr/0024-inventory-api-auth.md
      - etcd limits and OpenAPI: adr/0006-etcd-limit.md
      - Architecture decision records:
          - Overview: adr/README.md
          - "0001 Kubebuilder v4": adr/0001-kubebuilder-v4.md
          - "0003 CEL/JSONPath extraction": adr/0003-cel-jsonpath-extraction.md
          - "0004 CRD model": adr/0004-crd-model.md
          - "0006 etcd limit": adr/0006-etcd-limit.md
          - "0011 Doc-sync templating": adr/0011-doc-sync-templating.md
          - "0012 Prometheus metrics stub": adr/0012-prometheus-metrics-stub.md
          - "0013 Prior art": adr/0013-prior-art.md
          - "0014 Event-driven informers": adr/0014-event-driven-informers.md
          - "0015 Static vs reconciled": adr/0015-static-vs-reconciled.md
          - "0016 Namespaced multi-tenancy": adr/0016-namespaced-multi-tenancy.md
          - "0020 Error taxonomy": adr/0020-error-taxonomy.md
          - "0021 MkDocs GitHub Pages": adr/0021-mkdocs-github-pages.md
          - "0022 Multi-cluster sync": adr/0022-multi-cluster-sync-rfc.md
          - "0023 Lean queue transport": adr/0023-lean-queue-transport.md
          - "0024 Inventory API auth": adr/0024-inventory-api-auth.md
          - "0025 Postgres and Kafka sinks": adr/0025-sink-backends-database-kafka.md
          - "0026 Performance and scalability": adr/0026-performance-scalability.md
          - "0027 Helm release inventory": adr/0027-helm-release-inventory.md
          - "0028 Hub cluster auth (Istio)": adr/0028-hub-cluster-auth-istio-pattern.md
          - "0029 Watch labels": adr/0029-watch-labels.md
          - "0030 Connection test": adr/0030-connection-test.md
          - "0031 Namespaced profiles": adr/0031-namespaced-profiles.md
          - "0032 Platform architecture pivot": adr/0032-platform-architecture-pivot.md
          - "0033 Custom-resource aggregation (RFC)": adr/0033-custom-resource-aggregation-rfc.md
  - Contributing:
      - Roadmap: ROADMAP.md
      - Release process: RELEASE.md
      - Code review notes: CODE-REVIEW.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - toc:
      permalink: true

docs_dir: docs
site_dir: site

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/konih/kollect

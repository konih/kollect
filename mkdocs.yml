site_name: kollect
site_description: Kubernetes inventory export operator
site_url: https://konih.github.io/kollect/
repo_url: https://github.com/konih/kollect
repo_name: konih/kollect
copyright: Copyright &copy; 2026 Konrad Heimel

theme:
  name: material
  icon:
    logo: material/kubernetes
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

extra_css:
  - stylesheets/extra.css

nav:
  - Overview:
      - Home: index.md
  - Understand the Basics:
      - Architecture: ARCHITECTURE.md
      - Data flows: DATA-FLOWS.md
      - Platform decisions: PLATFORM-DECISIONS.md
  - Core Concepts:
      - CRD model: adr/0201-crd-model.md
      - CR reference: CR-REFERENCE.md
      - CEL and JSONPath extraction: adr/0302-cel-jsonpath-extraction.md
      - Sink backends: adr/0402-sink-backends-database-kafka.md
      - Hub and spoke: adr/0501-multi-cluster-sync-rfc.md
      - Multi-tenancy: adr/0203-namespaced-multi-tenancy.md
      - Namespaced profiles: adr/0204-namespaced-profiles.md
      - Watch labels: adr/0205-watch-labels.md
  - Getting Started:
      - Quick start: QUICKSTART.md
      - Development setup: DEVELOPMENT.md
      - Requirements: REQUIREMENTS.md
  - User Guide:
      - Examples:
          - Deployment inventory: examples/deployment-inventory.md
          - Helm release inventory: examples/helm-release-inventory.md
      - Connection test: adr/0403-connection-test.md
      - Performance tuning: PERFORMANCE.md
  - Reference:
      - Custom resources:
          - Overview: CR-REFERENCE.md
          - KollectProfile: crds/kollectprofile.md
          - KollectSink: crds/kollectsink.md
          - KollectTarget: crds/kollecttarget.md
          - KollectInventory: crds/kollectinventory.md
          - KollectScope: crds/kollectscope.md
          - KollectConnectionTest: crds/kollectconnectiontest.md
          - KollectClusterProfile: crds/kollectclusterprofile.md
          - KollectClusterTarget: crds/kollectclustertarget.md
          - KollectClusterInventory: crds/kollectclusterinventory.md
      - Inventory HTTP API: adr/0404-inventory-api-auth.md
      - etcd limits and OpenAPI: adr/0103-etcd-limit.md
      - Architecture decision records:
          - Overview: adr/README.md
          - 01 Foundations:
              - "0101 Kubebuilder v4 + controller-runtime": adr/0101-kubebuilder-v4.md
              - "0102 Prior art and OSS patterns": adr/0102-prior-art.md
              - "0103 Data storage and etcd limit": adr/0103-etcd-limit.md
              - "0104 Security model": adr/0104-security-model.md
          - 02 API & tenancy:
              - "0201 CRD model": adr/0201-crd-model.md
              - "0202 Static vs reconciled CRDs": adr/0202-static-vs-reconciled.md
              - "0203 Namespaced multi-tenancy": adr/0203-namespaced-multi-tenancy.md
              - "0204 Namespaced profiles": adr/0204-namespaced-profiles.md
              - "0205 Watch opt-in/opt-out labels": adr/0205-watch-labels.md
              - "0206 API versioning and conversion": adr/0206-api-versioning-conversion.md
          - 03 Collection & extraction:
              - "0301 Event-driven informers": adr/0301-event-driven-informers.md
              - "0302 CEL / JSONPath extraction": adr/0302-cel-jsonpath-extraction.md
              - "0303 Helm / Argo release inventory": adr/0303-helm-release-inventory.md
              - "0304 Custom-resource aggregation (RFC)": adr/0304-custom-resource-aggregation-rfc.md
              - "0305 Aggregation, identity, and dedupe": adr/0305-aggregation-dedupe.md
          - 04 Export & sinks:
              - "0401 Sink taxonomy — state vs stream": adr/0401-sink-taxonomy-state-vs-stream.md
              - "0402 Postgres and Kafka sinks": adr/0402-sink-backends-database-kafka.md
              - "0403 Connection test": adr/0403-connection-test.md
              - "0404 Inventory API auth": adr/0404-inventory-api-auth.md
              - "0405 Export data contract": adr/0405-export-data-contract.md
              - "0406 Sink registry and Backend interface": adr/0406-sink-registry.md
              - "0407 Git / object-store export layout": adr/0407-git-object-store-layout.md
              - "0408 Read API and UI architecture": adr/0408-read-api-ui-architecture.md
          - 05 Multi-cluster:
              - "0501 Multi-cluster sync topology": adr/0501-multi-cluster-sync-rfc.md
              - "0502 Event-emitter transport": adr/0502-lean-queue-transport.md
              - "0503 Hub cluster auth": adr/0503-hub-cluster-auth-istio-pattern.md
          - 06 Observability & ops:
              - "0601 Operator metrics": adr/0601-prometheus-metrics-stub.md
              - "0602 Error taxonomy": adr/0602-error-taxonomy.md
              - "0603 Performance and scalability": adr/0603-performance-scalability.md
          - 07 Project & meta:
              - "0701 MkDocs documentation site": adr/0701-mkdocs-github-pages.md
              - "0702 Doc-sync templating (dropped)": adr/0702-doc-sync-templating.md
              - "0703 Platform architecture pivot": adr/0703-platform-architecture-pivot.md
              - "0704 Helm chart and CRD lifecycle": adr/0704-helm-chart-crd-lifecycle.md
              - "0705 Release engineering and supply chain": adr/0705-release-supply-chain.md
  - Contributing:
      - Roadmap: ROADMAP.md
      - Release process: RELEASE.md
      - Code review notes: CODE-REVIEW.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - toc:
      permalink: true

docs_dir: docs
site_dir: site

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/konih/kollect

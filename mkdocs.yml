site_name: Kollect
site_description: Durable Kubernetes inventory — select, extract, aggregate, export
site_url: https://konih.github.io/kollect/
repo_url: https://github.com/konih/kollect
repo_name: konih/kollect
copyright: Copyright &copy; 2026 Konrad Heimel

theme:
  name: material
  logo: assets/branding/kollect-symbol-dark.svg
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

extra_css:
  - stylesheets/extra.css


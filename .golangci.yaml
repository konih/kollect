# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.v2.2.json
---
version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - copyloopvar
    - depguard
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - gomodguard
    - gosec
    - govet
    - ineffassign
    - lll
    - logcheck
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    depguard:
      rules:
        kollect_main:
          list-mode: lax
          files:
            - $all
            - "!$test"
          allow:
            - $gostd
          deny:
            - pkg: io/ioutil
              desc: "use io/os (Go 1.16+)"
            - pkg: github.com/sirupsen/logrus
              desc: "use log/slog / controller-runtime/log (logcheck)"
            - pkg: github.com/pkg/errors
              desc: "use stdlib errors + fmt.Errorf %w"
            - pkg: github.com/golang/protobuf
              desc: "use google.golang.org/protobuf"
        kollect_tests:
          list-mode: lax
          files:
            - $test
          deny:
            - pkg: github.com/stretchr/testify/assert
              desc: "prefer gomega/ginkgo matchers in this repo"
    dupl:
      threshold: 150
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    goconst:
      min-len: 3
      min-occurrences: 3
    gocyclo:
      min-complexity: 20
    gomodguard:
      blocked:
        modules:
          - github.com/sirupsen/logrus:
              reason: "use log/slog / controller-runtime/log (logcheck)"
          - github.com/pkg/errors:
              reason: "use stdlib errors + fmt.Errorf %w"
    govet:
      enable-all: true
      disable:
        - fieldalignment
    lll:
      line-length: 120
    nakedret:
      max-func-lines: 50
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
          arguments:
            - allowedPackages:
                - github.com/onsi/ginkgo/v2
                - github.com/onsi/gomega
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: bool-literal-in-expr
        - name: constant-logical-expr
        - name: comment-spacings
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      - linters:
          - dupl
          - gocyclo
          - goconst
          - unparam
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
      - references/
      - zz_generated\..*\.go$
      - ui/

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/konih/kollect
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - references/
      - zz_generated\..*\.go$
      - ui/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.v2.2.json
---
version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
  settings:
    dupl:
      threshold: 150
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    goconst:
      min-len: 3
      min-occurrences: 3
    gocyclo:
      min-complexity: 20
    govet:
      enable-all: true
      disable:
        - fieldalignment
    lll:
      line-length: 120
    nakedret:
      max-func-lines: 50
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
          arguments:
            - allowedPackages:
                - github.com/onsi/ginkgo/v2
                - github.com/onsi/gomega
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: bool-literal-in-expr
        - name: constant-logical-expr
        - name: comment-spacings
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - gocyclo
          - goconst
          - unparam
        path: _test\.go
    paths:
      - third_party$
      - zz_generated\..*\.go$
      - ui/

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/konih/kollect
  exclusions:
    generated: lax
    paths:
      - third_party$
      - zz_generated\..*\.go$
      - ui/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

# markdownlint-cli2 config — scoped to project docs (see Taskfile lint:markdown).
# MkDocs-friendly: allow mermaid/HTML; relax rules that fight tables, ADRs, git-cliff output.
config:
  default: true
  MD013: false
  MD033: false
  MD041: false
  MD024:
    siblings_only: true
  MD025: false
  MD040: false
  MD029: false
  MD060: false
  MD036: false
  MD022: false
  MD030: false
  MD045: false
  MD001: false
  MD007: false
  MD034: false
  MD051: false
  MD014: false
  MD003: false
  MD050: false
  MD059: false

globs:
  - docs/**/*.md
  - charts/**/README.md
  - README.md
  - CONTRIBUTING.md
  - SECURITY.md
  - GUIDELINES.md
  - hack/**/README.md
  - internal/**/README.md
  - .github/**/*.md

ignores:
  - site/**
  - vendor/**
  - references/**
  - agent-context/**
  - .mkdocs-venv/**
  - docs/node_modules/**
  - CHANGELOG.md

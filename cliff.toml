# git-cliff configuration — https://git-cliff.org/docs/configuration
# Commit subjects use Conventional Commits with a gitmoji token (see CONTRIBUTING.md).

[remote.github]
owner = "konih"
repo = "kollect"

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
Release notes are generated from [Conventional Commits](https://www.conventionalcommits.org/)
on the default branch using [git-cliff](https://git-cliff.org/).

## Version mapping (retroactive anchors)

Retroactive git tags `v0.0.1`–`v0.0.4` segment history before the first published GitHub
release. See [docs/RELEASE.md](docs/RELEASE.md) for the maintainer runbook.

| Tag | Anchor commit | Milestone |
| --- | --- | --- |
| `v0.0.1` | `13546aff` | Kubebuilder scaffold, MIT license |
| `v0.0.2` | `1e6f6719` | Core `v1alpha1` CRDs (Profile, Sink, Target, Inventory) |
| `v0.0.3` | `66421337` | Helm chart, CEL/JSONPath extraction, inventory HTTP |
| `v0.0.4` | `4234960b` | ADR-0032 platform pivot MVP (namespaced API, export pipeline) |
| `v0.1.0` | `main` HEAD | First published release (includes hub/cluster APIs since MVP) |

Reserve **`v0.1.0` for the first tag pushed at `main` HEAD** — do not use it as a changelog-only
anchor on an older commit.

"""
body = """
{% if version -%}
  {% if previous.version -%}
    ## [{{ version | trim_start_matches(pat="v") }}](https://github.com/konih/kollect/compare/{{ previous.version }}..{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
  {% else -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
  {% endif -%}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
      {% if commit.breaking %}[**breaking**] {% endif %}\
      {{ commit.message | upper_first }} \
      {% if commit.remote.pr_number %}([#{{ commit.remote.pr_number }}](https://github.com/konih/kollect/pull/{{ commit.remote.pr_number }})){% endif %}\
      [{{ commit.id | truncate(length=7, end="") }}](https://github.com/konih/kollect/commit/{{ commit.id }})
  {% endfor %}
{% endfor %}
"""
trim = true
output = "CHANGELOG.md"

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"

# :sparkles: feat(scope): summary  ->  feat(scope): summary  (gitmoji-first per CONTRIBUTING.md)
commit_preprocessors = [
  { pattern = '^:[a-z0-9_]+: ', replace = "" },
]

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "!", group = "Breaking Changes" },
  { message = "^docs", skip = true },
  { message = "^(test|chore|ci|build|style)", skip = true },
  { message = "^revert", group = "Reverts" },
]

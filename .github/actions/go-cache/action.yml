name: Setup Go and module cache
description: Install Go from go.mod and restore module/build caches. Optional envtest cache.
inputs:
  envtest:
    description: Cache kubebuilder-envtest binaries
    required: false
    default: "false"
  cache-suffix:
    description: Optional suffix for the Go module/build cache key (isolates parallel matrix jobs)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        # setup-go v6 caches GOMODCACHE/GOCACHE by default; we restore those paths
        # via actions/cache below (custom keys, matrix cache-suffix, envtest split).
        cache: false
    - name: Restore Go build and module cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ inputs.cache-suffix }}
        restore-keys: |
          ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-
          ${{ runner.os }}-go-
    - name: Restore envtest cache
      if: inputs.envtest == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.local/share/kubebuilder-envtest
          bin/k8s
        key: ${{ runner.os }}-envtest-1.35-${{ hashFiles('go.mod', 'go.sum', 'Makefile') }}
        restore-keys: |
          ${{ runner.os }}-envtest-1.35-

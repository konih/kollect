name: Kind E2E setup and run
description: >-
  Install cached kind/helm, create an isolated e2e cluster, optionally run a scenario script,
  and always teardown. Shared by e2e-smoke, e2e-nightly, e2e-extended, and test-e2e workflows.
inputs:
  envtest:
    description: Restore kubebuilder-envtest cache via go-cache
    required: false
    default: "true"
  setup-script:
    description: Cluster bootstrap script (relative to repo root)
    required: false
    default: hack/kind/e2e/setup.sh
  scenario-script:
    description: Optional post-setup scenario script (relative to repo root)
    required: false
    default: ""
  run-mode:
    description: Scenario runner mode — bash or repo_root
    required: false
    default: bash
  wait-timeout:
    description: Bounded wait for reconciliation scripts
    required: false
    default: 300s
  github-token:
    description: Optional GITHUB_TOKEN for git-export remote SHA assert
    required: false
    default: ""
  git-export-test-repo:
    description: >-
      Optional repository variable GIT_EXPORT_TEST_REPO (owner/repo URL) for full git-export assert.
      Set in GitHub repo Settings → Secrets and variables → Actions → Variables.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: ./.github/actions/go-cache
      with:
        envtest: ${{ inputs.envtest }}

    - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
      with:
        version: 3.51.1

    - name: Restore kind binary cache
      id: kind-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/kind/kind-0.32.0
        key: kind-0.32.0-linux-amd64

    - name: Install kind and helm
      shell: bash
      env:
        HELM_VERSION: v3.17.3
      run: |
        set -euo pipefail
        mkdir -p ~/.cache/kind
        if [[ "${{ steps.kind-cache.outputs.cache-hit }}" != "true" ]]; then
          for attempt in 1 2 3; do
            if curl -fsSL --retry 5 --retry-delay 5 --connect-timeout 30 \
              -o ~/.cache/kind/kind-0.32.0 \
              "https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64"; then
              break
            fi
            echo "kind download attempt ${attempt} failed; retrying..." >&2
            sleep 10
          done
          chmod +x ~/.cache/kind/kind-0.32.0
        fi
        sudo install -m 0755 ~/.cache/kind/kind-0.32.0 /usr/local/bin/kind
        bash hack/install-helm.sh

    - name: Create kind cluster and install operator
      shell: bash
      env:
        KIND_CLUSTER_WAIT: 300s
        KOLLECT_HELM_TIMEOUT: 300s
        KOLLECT_MANAGER_WAIT: 300s
      run: bash "${{ inputs.setup-script }}"

    - name: Run e2e scenario
      if: inputs.scenario-script != ''
      shell: bash
      env:
        WAIT_TIMEOUT: ${{ inputs.wait-timeout }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GIT_EXPORT_TEST_REPO: ${{ inputs.git-export-test-repo }}
      run: |
        set -euo pipefail
        script="${{ inputs.scenario-script }}"
        chmod +x "${script}"
        case "${{ inputs.run-mode }}" in
          bash) bash "${script}" ;;
          repo_root) REPO_ROOT="${GITHUB_WORKSPACE}" "${script}" ;;
          *) echo "unknown run-mode: ${{ inputs.run-mode }}" >&2; exit 1 ;;
        esac

    - name: Delete kind cluster
      if: always()
      shell: bash
      run: bash hack/kind/e2e/teardown.sh

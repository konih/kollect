# GitHub secret scanning path exclusions (SEC-02).
#
# These paths hold documented placeholders / demo credentials / test fixtures
# (e.g. postgres://kollect:example@…, fake OpenSSH PEM bodies). They are not
# production secrets. Ignoring them keeps the Security tab a zero-noise signal;
# any future alert outside this set must be treated as a real leak.
#
# Limits (GitHub):
#   - max 1000 paths-ignore entries (we use far fewer)
#   - file must be < 1 MB
#   - paths-ignore affects future scans + push protection on these paths only;
#     existing alerts are not retroactively closed by this file (dismiss via API).
#
# Defense in depth: .github/gitleaks.toml still scans these paths in CI. Do not
# widen this ignore set to silence a finding under internal/, charts/, cmd/, or
# .github/workflows/ — rotate + purge instead.
#
# Keep in sync with the SEC-02 acceptance criteria in agent-context/BACKLOG.md
# (local-only) when adjusting the set.
paths-ignore:
  - "config/samples/**"
  - "docs/**"
  - "hack/demo/**"
  - "**/*_test.go"
  - "internal/**/testdata/**"

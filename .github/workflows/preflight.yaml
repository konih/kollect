name: Preflight

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # git-cliff changelog:verify needs tags and full history
          fetch-tags: true
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.sum
      - name: Verify generated artifacts
        run: task verify
        env:
          CI: "true"
      - name: Verify CHANGELOG.md is up to date
        run: task changelog:verify
        env:
          CI: "true"
      - name: Perf-report preflight note
        run: |
          echo "::notice title=perf-report::Run task perf-report locally before scale or perf work (ADR-0603). Optional CI job perf-report runs the same gate without blocking merge."

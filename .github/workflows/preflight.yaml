name: Preflight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:

permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # git-cliff changelog:verify needs tags and full history
          fetch-tags: true
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Lint Markdown
        run: task lint:markdown
      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.sum
      - name: Verify go.sum checksums
        run: go mod verify
      - name: Verify generated artifacts
        run: task verify
        env:
          CI: "true"
      - name: Verify CHANGELOG.md is up to date
        run: task changelog:verify
        env:
          CI: "true"
      - name: Perf-report preflight note
        run: |
          echo "::notice title=perf-report::Run task perf-report locally before scale or perf work (ADR-0603). Optional CI job perf-report runs the same gate without blocking merge."

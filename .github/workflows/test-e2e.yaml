name: E2E (optional)

on:
  workflow_dispatch:
    inputs:
      skip_multitenant:
        description: "Skip multi-tenant isolation script (faster smoke)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

jobs:
  e2e:
    name: kind-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - name: Install kind and helm
        run: |
          curl -fsSL -o kind "https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64"
          chmod +x kind && sudo mv kind /usr/local/bin/kind
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Create kind cluster and install operator
        run: bash hack/kind/e2e/setup.sh

      - name: Run e2e smoke checks
        run: bash hack/kind/e2e/smoke.sh

      - name: Git export SHA assert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_EXPORT_TEST_REPO: ${{ vars.GIT_EXPORT_TEST_REPO }}
        run: |
          chmod +x hack/e2e/git-export-assert.sh
          REPO_ROOT="${GITHUB_WORKSPACE}" hack/e2e/git-export-assert.sh

      - name: tenantMode Helm RBAC smoke
        run: |
          chmod +x hack/e2e/tenant-mode.sh
          REPO_ROOT="${GITHUB_WORKSPACE}" hack/e2e/tenant-mode.sh

      - name: Multi-tenant namespace isolation
        if: ${{ !inputs.skip_multitenant }}
        run: |
          chmod +x hack/e2e/multitenant.sh
          REPO_ROOT="${GITHUB_WORKSPACE}" hack/e2e/multitenant.sh

      - name: Object store sink integration (S3/GCS)
        run: |
          go test -count=1 -timeout=10m -tags=integration \
            ./internal/sink/s3/... ./internal/sink/gcs/...

      - name: Delete kind cluster
        if: always()
        run: bash hack/kind/e2e/teardown.sh

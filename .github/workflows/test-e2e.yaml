# Manual full L4 Kind matrix — mirrors e2e-nightly.yaml (no L3 duplicates).
name: E2E (manual)

on:
  workflow_dispatch:
    inputs:
      skip_multitenant:
        description: "Skip multi-tenant isolation scenario"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: test-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-scenario:
    name: e2e-${{ matrix.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: smoke
            script: hack/kind/e2e/smoke.sh
            run_mode: bash
          - scenario: git-export
            script: hack/e2e/git-export-assert.sh
            run_mode: repo_root
          - scenario: tenant-mode
            script: hack/e2e/tenant-mode.sh
            run_mode: repo_root
          - scenario: multitenant
            script: hack/e2e/multitenant.sh
            run_mode: repo_root
            skip_when_multitenant: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Skip multitenant when requested
        if: matrix.skip_when_multitenant && inputs.skip_multitenant
        run: echo "Skipping multitenant scenario (skip_multitenant=true)."

      - uses: ./.github/actions/kind-e2e-setup
        if: ${{ !(matrix.skip_when_multitenant && inputs.skip_multitenant) }}
        with:
          scenario-script: ${{ matrix.script }}
          run-mode: ${{ matrix.run_mode }}
          wait-timeout: 300s
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-export-test-repo: ${{ vars.GIT_EXPORT_TEST_REPO }}

# Nightly L4 Kind matrix (deduped — L3 export/object-store runs in ci.yaml test-integration).
name: E2E nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Each scenario gets its own Kind cluster (setup → scenario → teardown) so failures
  # are isolated and parallelized. fail-fast: false keeps other scenarios running.
  e2e-scenario:
    name: e2e-${{ matrix.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: smoke
            script: hack/kind/e2e/smoke.sh
            run_mode: bash
          - scenario: git-export
            script: hack/e2e/git-export-assert.sh
            run_mode: repo_root
          - scenario: tenant-mode
            script: hack/e2e/tenant-mode.sh
            run_mode: repo_root
          - scenario: multitenant
            script: hack/e2e/multitenant.sh
            run_mode: repo_root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/kind-e2e-setup
        with:
          scenario-script: ${{ matrix.script }}
          run-mode: ${{ matrix.run_mode }}
          wait-timeout: 300s
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-export-test-repo: ${{ vars.GIT_EXPORT_TEST_REPO }}

      - name: Summarize nightly failure
        if: failure()
        shell: bash
        run: |
          {
            echo "::error title=Nightly e2e failed::Scenario '${{ matrix.scenario }}' failed."
            echo "Triage: check inventory reconciliation timeouts, kind.sigs.k8s.io download flakes,"
            echo "and Helm install waits. Re-run via workflow_dispatch or \`task test:e2e\` locally."
            echo "Maintainer notes: agent-context/E2E-TEST-STRATEGY.md"
          } >> "${GITHUB_STEP_SUMMARY}"

  e2e-bench:
    name: e2e-bench
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1

      - name: Micro-benchmarks
        run: task bench

      - name: Upload bench artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-latest
          path: artifacts/bench/latest.txt
          retention-days: 14
          if-no-files-found: warn

  e2e-perf-report:
    name: e2e-perf-report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1

      - name: Performance snapshot
        run: task perf-report
        env:
          CI: "true"

  load-test-10k:
    name: load-test-10k
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1

      - name: Opt-in 10k load tier
        run: task load-test:10k
        env:
          CI: "true"

  scale-envtest-10k:
    name: scale-envtest-10k
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1

      - name: Extended envtest scale (10k)
        run: go test -run TestEngine_ScaleEnvtestOptIn -count=1 -timeout=35m ./internal/collect/...
        env:
          KOLECT_SCALE_TEST_MAX: "10000"
          CI: "true"

  ui-playwright-msw:
    name: ui-playwright-msw
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build UI for e2e (MSW)
        run: npm run build
        env:
          VITE_MOCK_API: "true"

      - name: Playwright smoke (MSW)
        run: npm run test:e2e
        env:
          CI: "true"

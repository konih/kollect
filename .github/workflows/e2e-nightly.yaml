name: E2E nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Each scenario gets its own Kind cluster (setup → scenario → teardown) so failures
  # are isolated and parallelized. fail-fast: false keeps other scenarios running.
  e2e-scenario:
    name: e2e-${{ matrix.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: smoke
            script: hack/kind/e2e/smoke.sh
            run_mode: bash
          - scenario: git-export
            script: hack/e2e/git-export-assert.sh
            run_mode: repo_root
          - scenario: export-integration
            script: hack/e2e/export-integration-assert.sh
            run_mode: bash
          - scenario: tenant-mode
            script: hack/e2e/tenant-mode.sh
            run_mode: repo_root
          - scenario: multitenant
            script: hack/e2e/multitenant.sh
            run_mode: repo_root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1

      - name: Install kind and helm
        env:
          HELM_VERSION: v3.17.3
        run: |
          curl -fsSL -o kind "https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64"
          chmod +x kind && sudo mv kind /usr/local/bin/kind
          bash hack/install-helm.sh

      - name: Create kind cluster and install operator
        env:
          KIND_CLUSTER_WAIT: 300s
          KOLLECT_HELM_TIMEOUT: 300s
          KOLLECT_MANAGER_WAIT: 300s
        run: bash hack/kind/e2e/setup.sh

      - name: Run e2e scenario
        env:
          WAIT_TIMEOUT: 300s
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_EXPORT_TEST_REPO: ${{ vars.GIT_EXPORT_TEST_REPO }}
        run: |
          chmod +x "${{ matrix.script }}"
          case "${{ matrix.run_mode }}" in
            bash) bash "${{ matrix.script }}" ;;
            repo_root) REPO_ROOT="${GITHUB_WORKSPACE}" "${{ matrix.script }}" ;;
          esac

      - name: Delete kind cluster
        if: always()
        run: bash hack/kind/e2e/teardown.sh

  e2e-bench:
    name: e2e-bench
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1

      - name: Micro-benchmarks
        run: task bench

      - name: Upload bench artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-latest
          path: artifacts/bench/latest.txt
          retention-days: 14
          if-no-files-found: warn

  e2e-perf-report:
    name: e2e-perf-report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1

      - name: Performance snapshot
        run: task perf-report
        env:
          CI: "true"

  e2e-object-store:
    name: e2e-object-store
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache

      - name: Object store sink integration (S3/GCS)
        run: |
          go test -count=1 -timeout=10m -tags=integration \
            ./internal/sink/s3/... ./internal/sink/gcs/...

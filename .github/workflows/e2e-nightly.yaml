name: E2E nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-nightly:
    name: kind-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - name: Install kind and helm
        run: |
          curl -fsSL -o kind "https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64"
          chmod +x kind && sudo mv kind /usr/local/bin/kind
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Create kind cluster
        run: |
          kind create cluster --name kollect-nightly --wait 120s
          kubectl cluster-info --context kind-kollect-nightly

      - name: Build and load controller image
        run: |
          task docker:build
          kind load docker-image kollect-controller-manager:dev --name kollect-nightly

      - name: Install operator via Helm
        run: |
          helm upgrade --install kollect charts/kollect \
            --namespace kollect-system --create-namespace \
            -f charts/kollect/ci/e2e-tenant-values.yaml \
            --set image.repository=kollect-controller-manager \
            --set image.tag=dev \
            --set image.pullPolicy=IfNotPresent \
            --wait --timeout 120s

      - name: Wait for manager pod
        run: |
          kubectl wait --for=condition=Ready pod \
            -l app.kubernetes.io/name=kollect \
            -n kollect-system \
            --timeout=120s

      - name: Apply sample CRs
        run: kubectl apply -k config/samples/

      - name: Seed nginx Deployment for target collection
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx
            namespace: default
            labels:
              app.kubernetes.io/name: nginx
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: nginx
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: nginx
              spec:
                containers:
                  - name: nginx
                    image: nginx:1.27-alpine
          EOF

      - name: Wait for KollectTarget Ready
        run: |
          kubectl wait --for=condition=Ready kollecttarget/nginx-deployments \
            -n default --timeout=120s

      - name: Wait for KollectInventory reconciled
        run: |
          for i in $(seq 1 24); do
            gen=$(kubectl get kollectinventory team-inventory -n default -o jsonpath='{.metadata.generation}')
            obs=$(kubectl get kollectinventory team-inventory -n default -o jsonpath='{.status.observedGeneration}')
            if [ -n "$obs" ] && [ "$obs" = "$gen" ]; then
              kubectl get kollectinventory team-inventory -n default -o yaml | grep -E 'type:|reason:|message:'
              exit 0
            fi
            sleep 5
          done
          echo "inventory not reconciled within timeout" >&2
          kubectl describe kollectinventory team-inventory -n default
          exit 1

      - name: Assert CRDs accepted
        run: |
          kubectl wait --for=condition=Established crd/kollectprofiles.kollect.dev --timeout=120s
          kubectl wait --for=condition=Established crd/kollecttargets.kollect.dev --timeout=120s
          kubectl wait --for=condition=Established crd/kollectinventories.kollect.dev --timeout=120s
          kubectl wait --for=condition=Established crd/kollectsinks.kollect.dev --timeout=120s
          kubectl wait --for=condition=Established crd/kollecthubs.kollect.dev --timeout=120s
          kubectl wait --for=condition=Established crd/kollectscopes.kollect.dev --timeout=120s
          kubectl get kollectprofiles,kollecttargets,kollectinventories,kollectsinks -A

      - name: Probe inventory HTTP
        run: |
          kubectl port-forward -n kollect-system svc/kollect-controller-manager 18082:8082 &
          PF_PID=$!
          sleep 3
          curl -sf http://127.0.0.1:18082/inventory | grep -q itemCount
          kill $PF_PID

      - name: Multi-tenant namespace isolation
        run: |
          chmod +x hack/e2e/multitenant.sh
          REPO_ROOT="${GITHUB_WORKSPACE}" hack/e2e/multitenant.sh

      - name: Micro-benchmarks
        run: task bench

      - name: Upload bench artifact
        uses: actions/upload-artifact@ea165f8d65d661de671f4242b1655b05aa3e2054 # v4.6.2
        with:
          name: bench-latest
          path: artifacts/bench/latest.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Git export assert (bare repo)
        run: go test -count=1 -timeout=2m ./internal/sink/git/ -run TestExportBareRepoIntegration

      - name: Git export remote (optional)
        if: ${{ secrets.GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GITHUB_TOKEN is set; remote git push e2e is not wired yet — bare-repo assert above covers export path."

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name kollect-nightly

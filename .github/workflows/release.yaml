name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.1.0); workflow_dispatch rebuilds assets for testing"
        required: true
        type: string
      draft:
        description: "Create/update the GitHub Release as a draft"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark the GitHub Release as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kollect
  UI_IMAGE_NAME: kollect-ui

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    # contents: write — create/update GitHub Release assets (softprops/action-gh-release, git-cliff)
    # packages: write — push container image and OCI Helm chart to GHCR
    # id-token: write — cosign keyless signing via Sigstore OIDC
    # attestations: write — publish SLSA provenance to GH attestations API
    # artifact-metadata: write — registry storage records for attested images
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve version
        id: version
        env:
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${INPUT_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "tag must look like vX.Y.Z (got ${TAG})" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.17.3

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}"
          echo "repository=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "tags=${IMAGE}:${{ steps.version.outputs.version }},${IMAGE}:${{ steps.version.outputs.tag }}" >> "${GITHUB_OUTPUT}"

      - name: Build and push controller image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.repository }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign container image
        run: |
          cosign sign --yes \
            "${{ steps.image.outputs.repository }}@${{ steps.build.outputs.digest }}"

      - id: ui-image
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${{ env.REGISTRY }}/${OWNER}/${{ env.UI_IMAGE_NAME }}"
          echo "repository=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "tags=${IMAGE}:${{ steps.version.outputs.version }},${IMAGE}:${{ steps.version.outputs.tag }}" >> "${GITHUB_OUTPUT}"

      - name: Build and push kollect-ui image
        id: ui-build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ui
          file: ui/Dockerfile
          # Multi-arch: node/nginx alpine bases publish arm64; UI is static assets only.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.ui-image.outputs.tags }}
          cache-from: type=gha,scope=kollect-ui
          cache-to: type=gha,mode=max,scope=kollect-ui
          sbom: true
          provenance: mode=max

      - name: Scan kollect-ui image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.ui-image.outputs.repository }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Sign kollect-ui container image
        run: |
          cosign sign --yes \
            "${{ steps.ui-image.outputs.repository }}@${{ steps.ui-build.outputs.digest }}"

      - name: Prepare dist directory
        run: mkdir -p dist

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.image.outputs.repository }}@${{ steps.build.outputs.digest }}
          output-file: dist/sbom.spdx.json
          format: spdx-json
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.ui-image.outputs.repository }}@${{ steps.ui-build.outputs.digest }}
          output-file: dist/sbom-ui.spdx.json
          format: spdx-json
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest operator image (SLSA provenance)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.2.0
        with:
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest operator image (SBOM)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.2.0
        with:
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: dist/sbom.spdx.json
          push-to-registry: true

      - name: Attest kollect-ui image (SLSA provenance)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.2.0
        with:
          subject-name: ${{ steps.ui-image.outputs.repository }}
          subject-digest: ${{ steps.ui-build.outputs.digest }}
          push-to-registry: true

      - name: Attest kollect-ui image (SBOM)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.2.0
        with:
          subject-name: ${{ steps.ui-image.outputs.repository }}
          subject-digest: ${{ steps.ui-build.outputs.digest }}
          sbom-path: dist/sbom-ui.spdx.json
          push-to-registry: true

      - name: Build release assets
        run: bash hack/release-assets.sh "${{ steps.version.outputs.version }}" "${{ steps.image.outputs.repository }}"

      - name: Sign GitHub Release assets
        run: bash hack/sign-release-assets.sh dist

      - name: Attest GitHub Release assets (SLSA provenance)
        id: attest-release
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.2.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Export release provenance bundle
        run: cp "${{ steps.attest-release.outputs.bundle-path }}" dist/release-provenance.intoto.jsonl

      - id: chart
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "oci=oci://${{ env.REGISTRY }}/${OWNER}" >> "${GITHUB_OUTPUT}"

      - name: Publish and sign Helm chart (OCI)
        run: |
          set -euo pipefail
          CHART_PKG="dist/kollect-${{ steps.version.outputs.version }}.tgz"
          PUSH_OUT="$(helm push "${CHART_PKG}" "${{ steps.chart.outputs.oci }}" 2>&1)"
          echo "$PUSH_OUT"
          DIGEST="$(echo "$PUSH_OUT" | awk '/Digest:/{print $2; exit}')"
          if [[ -z "${DIGEST}" ]]; then
            echo "failed to extract chart digest from helm push output" >&2
            exit 1
          fi
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          CHART_REF="${{ env.REGISTRY }}/${OWNER}/kollect@${DIGEST}"
          echo "Signing ${CHART_REF}"
          cosign sign --yes "${CHART_REF}"

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          version: v2.13.1
          config: cliff.toml
          args: --latest --strip header
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble release notes
        env:
          CLIFF_CHANGELOG: ${{ steps.cliff.outputs.content }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          IMAGE_REPO: ${{ steps.image.outputs.repository }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          UI_IMAGE_REPO: ${{ steps.ui-image.outputs.repository }}
          UI_IMAGE_DIGEST: ${{ steps.ui-build.outputs.digest }}
          CHART_OCI: ${{ steps.chart.outputs.oci }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x hack/assemble-release-notes.sh
          printf '%s\n' "${CLIFF_CHANGELOG}" >"${RUNNER_TEMP}/changelog.md"
          CHANGELOG_SECTION="${RUNNER_TEMP}/changelog.md" \
            bash hack/assemble-release-notes.sh "${RUNNER_TEMP}/release-body.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: kollect ${{ steps.version.outputs.version }}
          body_path: ${{ runner.temp }}/release-body.md
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            dist/install-crds.yaml
            dist/install.yaml
            dist/kollect-${{ steps.version.outputs.version }}.tgz
            dist/sbom.spdx.json
            dist/sbom-ui.spdx.json
            dist/checksums.txt
            dist/release-provenance.intoto.jsonl
            dist/*.sigstore.json

name: E2E (webhook/cert paths)

# Kind smoke on PR when webhook or cert-manager collection paths change.
# Full L4 suite remains in e2e-nightly.yaml (NFR-TEST-3).

on:
  pull_request:
    paths:
      - "internal/webhook/**"
      - "config/webhook/**"
      - "charts/kollect/templates/validating-webhook-configuration.yaml"
      - "charts/kollect/templates/webhook-certmanager.yaml"
      - "charts/kollect/templates/webhook-service.yaml"
      - "hack/e2e/cert-manager.sh"
      - "config/samples/kollect_v1alpha1_kollectprofile_certificate-summary.yaml"
      - "config/samples/kollect_v1alpha1_kollecttarget_certificates.yaml"

permissions:
  contents: read

jobs:
  e2e-smoke:
    name: kind-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/go-cache
        with:
          envtest: true

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1

      - name: Install kind and helm
        env:
          HELM_VERSION: v3.17.3
        run: |
          curl -fsSL -o kind "https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64"
          chmod +x kind && sudo mv kind /usr/local/bin/kind
          bash hack/install-helm.sh

      - name: Create kind cluster and install operator
        env:
          KIND_CLUSTER_WAIT: 300s
          KOLLECT_HELM_TIMEOUT: 300s
          KOLLECT_MANAGER_WAIT: 300s
        run: bash hack/kind/e2e/setup.sh

      - name: Run e2e smoke checks
        env:
          WAIT_TIMEOUT: 300s
        run: bash hack/kind/e2e/smoke.sh

      - name: Delete kind cluster
        if: always()
        run: bash hack/kind/e2e/teardown.sh

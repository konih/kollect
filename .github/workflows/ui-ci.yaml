name: UI CI

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - "hack/ci/ui-verify.sh"
      - ".github/workflows/ui-ci.yaml"
  pull_request:
    paths:
      - "ui/**"
      - "hack/ci/ui-verify.sh"
      - ".github/workflows/ui-ci.yaml"

permissions:
  contents: read

jobs:
  ui-verify:
    name: ui-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: UI verify (build, typecheck, test, lint)
        run: bash hack/ci/ui-verify.sh

  ui-image:
    name: ui-image
    runs-on: ubuntu-latest
    needs: [ui-verify]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build UI container image (build-only; release workflow publishes)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ui
          file: ui/Dockerfile
          platforms: linux/amd64
          push: false
          tags: ghcr.io/platformrelay/kollect-ui:ci
          cache-from: type=gha,scope=kollect-ui
          cache-to: type=gha,mode=max,scope=kollect-ui

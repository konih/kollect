# Manual SonarCloud re-scan (coverage + analysis). PR/push scans run as the
# `sonarcloud` job in `.github/workflows/ci.yaml` (reuses the test job artifact).
name: SonarCloud

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonarcloud:
    name: sonarcloud
    if: false # SonarCloud org migration — manual rescans paused until new org
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      COVERAGE_MIN: "65"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Unit tests and coverage
        run: task coverage
        env:
          CI: "true"
      - uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarCloud note (no token)
        if: success()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::warning::SONAR_TOKEN secret is unset; SonarCloud scan skipped (see docs/development/tooling-setup.md)."
          fi

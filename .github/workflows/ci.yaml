name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C "${RUNNER_TEMP}" gitleaks
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
      - name: Scan repository
        run: gitleaks detect --source . --config .github/gitleaks.toml --verbose --redact --no-git

  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Verify generated artifacts
        run: task verify
        env:
          CI: "true"

  audit-rbac:
    name: audit-rbac
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: RBAC security audit (Polaris + kubeaudit)
        run: bash hack/audit-rbac.sh
        env:
          POLARIS_VERSION: "9.6.0"
          KUBEAUDIT_VERSION: "0.22.2"

  vulncheck:
    name: vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: govulncheck
        run: task vulncheck

  # lint job runs `task lint` → golangci-lint v2 (depguard, gomodguard, …) + go-arch-lint
  # (internal/ package graph; see .go-arch-lint.yml). No separate arch-lint step needed.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Check formatting
        run: task format:check
      - name: Install ShellCheck
        run: |
          curl -sSfL https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz \
            | tar -xJ -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/shellcheck-v0.11.0" >> "${GITHUB_PATH}"
      - name: Lint shell scripts
        run: task lint:shell
      - name: Lint
        run: task lint

  lint-markdown:
    name: lint-markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Markdown lint
        run: task lint:markdown

  test:
    name: test
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      COVERAGE_MIN: "65"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Unit tests and coverage floor
        run: task coverage
        env:
          CI: "true"
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tee coverage-summary.txt
      - name: Job summary
        run: |
          echo "### Coverage" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          tail -20 coverage-summary.txt >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage.out
            coverage-summary.txt
          if-no-files-found: error
      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.out
          fail_ci_if_error: false
          use_oidc: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Codecov upload note (no token)
        if: success() && env.CODECOV_TOKEN == ''
        run: |
          echo "::warning::CODECOV_TOKEN secret is unset; Codecov upload skipped (configure repo secret for uploads)."

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Build manager
        run: task build

  test-integration:
    name: test-integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Integration tests (testcontainers)
        run: task test-integration
        env:
          CI: "true"

  helm:
    name: helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Install Helm
        env:
          HELM_VERSION: v3.17.3
        run: bash hack/install-helm.sh
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.5.1
      - name: Helm lint and unittest
        run: task helm-test

  perf-report:
    name: perf-report
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Performance snapshot (optional gate)
        run: task perf-report
        env:
          CI: "true"
      - name: Job summary
        if: always()
        run: |
          echo "### perf-report (optional)" >> "${GITHUB_STEP_SUMMARY}"
          echo "Runs \`task perf-report\` (bench excerpt + unit pass). Does not block merge." >> "${GITHUB_STEP_SUMMARY}"
          echo "Regenerate locally before scale work — see [PERFORMANCE.md](https://github.com/konih/kollect/blob/main/docs/PERFORMANCE.md)." >> "${GITHUB_STEP_SUMMARY}"

  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: FuzzContentHash
            pkg: ./internal/aggregate/...
          - target: FuzzExtractJSONPath
            pkg: ./internal/collect/...
          - target: FuzzExtractCEL
            pkg: ./internal/collect/...
          - target: FuzzValidateAttributePath
            pkg: ./internal/collect/...
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          cache-suffix: fuzz-${{ matrix.target }}
      - name: Native Go fuzz (30s)
        run: go test -run=^$ -fuzz=${{ matrix.target }} -fuzztime=30s ${{ matrix.pkg }}

  # SonarCloud: GitHub secret SONAR_TOKEN (SonarCloud analysis token). Local dev uses
  # SONARCLOUD_TOKEN in .envrc — same value, different name (see tooling-setup.md).
  # Job disabled until the repository moves to the new SonarCloud org (re-enable after migration).
  sonarcloud:
    name: sonarcloud
    if: false # SonarCloud org migration — see docs/development/tooling-setup.md
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage
      - uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarCloud note (no token)
        if: success()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::warning::SONAR_TOKEN secret is unset; SonarCloud scan skipped (configure org token — see docs/development/tooling-setup.md)."
          fi

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.51.1
      - name: Build controller image
        run: task docker:build

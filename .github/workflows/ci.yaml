name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write # Codecov OIDC upload (public repos)

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C "${RUNNER_TEMP}" gitleaks
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
      - name: Scan repository
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact --no-git

  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: Verify generated artifacts
        run: task verify
        env:
          CI: "true"

  vulncheck:
    name: vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: govulncheck
        run: task vulncheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: Check formatting
        run: task format:check
      - name: Lint
        run: task lint

  test:
    name: test
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: Unit tests and coverage floor
        run: task coverage
        env:
          CI: "true"
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tee coverage-summary.txt
      - name: Job summary
        run: |
          echo "### Coverage" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          tail -20 coverage-summary.txt >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage.out
            coverage-summary.txt
          if-no-files-found: error
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.out
          fail_ci_if_error: false
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Codecov upload note (no token)
        if: env.CODECOV_TOKEN == ''
        run: |
          echo "::notice::Codecov upload uses OIDC for public repos; optional CODECOV_TOKEN secret also supported."

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: Build manager
        run: task build

  test-integration:
    name: test-integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: Integration tests (testcontainers)
        run: task test-integration
        env:
          CI: "true"

  helm:
    name: helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.5.1
      - name: Helm lint and unittest
        run: task helm-test

  perf-report:
    name: perf-report
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: Performance snapshot (optional gate)
        run: task perf-report
        env:
          CI: "true"
      - name: Job summary
        if: always()
        run: |
          echo "### perf-report (optional)" >> "${GITHUB_STEP_SUMMARY}"
          echo "Runs \`task perf-report\` (bench excerpt + unit pass). Does not block merge." >> "${GITHUB_STEP_SUMMARY}"
          echo "Regenerate locally before scale work — see [PERFORMANCE.md](https://github.com/konih/kollect/blob/main/docs/PERFORMANCE.md)." >> "${GITHUB_STEP_SUMMARY}"

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - name: Build controller image
        run: task docker:build

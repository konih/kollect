# CI path filter matrix (see docs/development/testing.md):
# - Docs-only changes (docs/**, mkdocs.yml, root prose *.md, CHANGELOG, LICENSE, issue templates)
#   skip this workflow; Docs workflow runs lint-markdown + MkDocs build/deploy instead.
# - Any change under api/, internal/, charts/, cmd/, config/, hack/, ui/, test/, go.mod, or
#   .github/workflows/ always runs full CI. Mixed PRs (docs + code) run everything.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C "${RUNNER_TEMP}" gitleaks
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
      - name: Scan repository
        run: gitleaks detect --source . --config .github/gitleaks.toml --verbose --redact --no-git

  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - name: Verify generated artifacts
        run: task verify
        env:
          CI: "true"

  audit-rbac:
    name: audit-rbac
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: RBAC security audit (Polaris + kubeaudit)
        run: bash hack/audit-rbac.sh
        env:
          POLARIS_VERSION: "9.6.0"
          KUBEAUDIT_VERSION: "0.22.2"

  vulncheck:
    name: vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - name: govulncheck
        run: task vulncheck

  # lint job runs `task lint` → golangci-lint v2 (depguard, gomodguard, …) + go-arch-lint
  # (internal/ package graph; see .go-arch-lint.yml). No separate arch-lint step needed.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - name: Check formatting
        run: task format:check
      - name: Install ShellCheck
        run: |
          curl -sSfL https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz \
            | tar -xJ -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/shellcheck-v0.11.0" >> "${GITHUB_PATH}"
      - name: Lint shell scripts
        run: task lint:shell
      - name: Lint
        run: task lint

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Codecov OIDC upload; GitHub App still required for reliable PR comments
    env:
      COVERAGE_MIN: "80"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - name: Unit tests and coverage floor
        run: task coverage
        env:
          CI: "true"
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tee coverage-summary.txt
      - name: Job summary
        run: |
          echo "### Coverage" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          tail -20 coverage-summary.txt >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage.out
            coverage-summary.txt
          if-no-files-found: error
      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          fail_ci_if_error: false
          use_oidc: true

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - name: Build manager
        run: task build

  test-integration:
    name: test-integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - name: Integration tests (testcontainers)
        run: task test-integration
        env:
          CI: "true"

  helm:
    name: helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - name: Install Helm
        env:
          HELM_VERSION: v3.17.3
        run: bash hack/install-helm.sh
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.5.1
      - name: Helm lint and unittest
        run: task helm-test

  perf-report:
    name: perf-report
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: true
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - name: Performance snapshot (optional gate)
        run: task perf-report
        env:
          CI: "true"
      - name: Upload perf snapshot
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-snapshot
          path: artifacts/perf-snapshot.md
          retention-days: 14
          if-no-files-found: warn
      - name: Job summary
        if: always()
        run: |
          {
            echo "### perf-report (optional)"
            echo "Runs \`task perf-report\` (bench excerpt + unit pass). Does not block merge."
            if [[ -f artifacts/perf-snapshot.md ]]; then
              echo ""
              echo "Snapshot excerpt:"
              echo '```'
              sed -n '1,24p' artifacts/perf-snapshot.md
              echo '```'
            fi
            echo "Download \`perf-snapshot\` artifact for full report. Regenerate locally before scale work — see [PERFORMANCE.md](https://github.com/platformrelay/kollect/blob/main/docs/PERFORMANCE.md)."
          } >> "${GITHUB_STEP_SUMMARY}"

  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: FuzzContentHash
            pkg: ./internal/aggregate/...
          - target: FuzzExtractJSONPath
            pkg: ./internal/collect/...
          - target: FuzzExtractCEL
            pkg: ./internal/collect/...
          - target: FuzzValidateAttributePath
            pkg: ./internal/collect/...
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          cache-suffix: fuzz-${{ matrix.target }}
      - name: Native Go fuzz (30s)
        env:
          FUZZ_TARGET: ${{ matrix.target }}
          FUZZ_PKG: ${{ matrix.pkg }}
        # Retry transient failures only. A reproducible crash writes a seed
        # under testdata/fuzz/ and fails every run, so if that corpus appears
        # we bail immediately rather than mask a real finding. Retries cover
        # the runner-contention artifact where the engine reports
        # "context deadline exceeded" at the fuzztime boundary.
        run: |
          set -uo pipefail
          for attempt in 1 2; do
            if go test -run='^$' -fuzz="${FUZZ_TARGET}" -fuzztime=30s "${FUZZ_PKG}"; then
              exit 0
            fi
            if git status --porcelain | grep -q 'testdata/fuzz/'; then
              echo "::error::${FUZZ_TARGET} produced a crashing input — not retrying"
              exit 1
            fi
            echo "::warning::${FUZZ_TARGET} failed transiently on attempt ${attempt} (no crash corpus); retrying"
          done
          exit 1

  # SonarCloud: GitHub secret SONAR_TOKEN (SonarCloud analysis token). Local dev uses
  # SONARCLOUD_TOKEN in .envrc — same value, different name (see tooling-setup.md).
  # Job disabled until the repository moves to the new SonarCloud org (re-enable after migration).
  sonarcloud:
    name: sonarcloud
    if: false # SonarCloud org migration — see docs/development/tooling-setup.md
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage
      - uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarCloud note (no token)
        if: success()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::warning::SONAR_TOKEN secret is unset; SonarCloud scan skipped (configure org token — see docs/development/tooling-setup.md)."
          fi

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/go-cache
      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.51.1
      - name: Build controller image
        run: task docker:build

      # kollect-pipeline image (ADR-0801 P-006). release.yaml only builds it on v* tags, so this
      # PR-time build+run smoke is the first place a broken Dockerfile.pipeline or entrypoint is
      # caught. Single-arch (native runner) to stay fast; the release job builds multi-arch.
      - name: Build kollect-pipeline image
        run: task docker:build:pipeline

      - name: Smoke test kollect-pipeline image (--help exits 0)
        run: docker run --rm kollect-pipeline:dev --help

      - name: Assert kollect-pipeline image runs as nonroot (UID 65532)
        run: |
          user="$(docker inspect --format '{{.Config.User}}' kollect-pipeline:dev)"
          echo "image user: ${user}"
          if [ "${user}" != "65532:65532" ]; then
            echo "::error::kollect-pipeline image must run as 65532:65532, got '${user}'" >&2
            exit 1
          fi

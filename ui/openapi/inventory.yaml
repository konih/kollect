openapi: 3.0.3
info:
  title: kollect inventory HTTP API
  version: v1alpha1
  description: |
    Optional debug read API (default off). Requires Kubernetes bearer auth with
    list/get permission on kollectinventories (and kollecttargets for status routes)
    when auth mode is kubernetes.
paths:
  /v1alpha1/inventory:
    get:
      summary: Aggregated inventory snapshot
      parameters:
        - $ref: "#/components/parameters/namespace"
        - $ref: "#/components/parameters/inventory"
        - $ref: "#/components/parameters/target"
        - $ref: "#/components/parameters/group"
        - $ref: "#/components/parameters/version"
        - $ref: "#/components/parameters/kind"
        - $ref: "#/components/parameters/name"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Inventory summary JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySummary"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  /v1alpha1/inventory/{namespace}/{name}:
    get:
      summary: Inventory snapshot for a namespaced KollectInventory
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/target"
        - $ref: "#/components/parameters/group"
        - $ref: "#/components/parameters/version"
        - $ref: "#/components/parameters/kind"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Inventory summary JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySummary"
  /v1alpha1/inventory/watch:
    get:
      summary: Server-sent events stream of inventory snapshots
      parameters:
        - $ref: "#/components/parameters/namespace"
        - $ref: "#/components/parameters/inventory"
        - $ref: "#/components/parameters/target"
        - $ref: "#/components/parameters/group"
        - $ref: "#/components/parameters/version"
        - $ref: "#/components/parameters/kind"
        - $ref: "#/components/parameters/name"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: text/event-stream of InventorySummary payloads
          content:
            text/event-stream:
              schema:
                type: string
  /v1alpha1/status/inventories:
    get:
      summary: KollectInventory CRD status projection
      parameters:
        - $ref: "#/components/parameters/namespace"
      responses:
        "200":
          description: Inventory CR status list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusListResponse"
  /v1alpha1/status/targets:
    get:
      summary: KollectTarget CRD status projection
      parameters:
        - $ref: "#/components/parameters/namespace"
      responses:
        "200":
          description: Target CR status list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusListResponse"
components:
  parameters:
    namespace:
      name: namespace
      in: query
      schema:
        type: string
      description: Filter collected items or CR status to a namespace
    inventory:
      name: inventory
      in: query
      schema:
        type: string
      description: KollectInventory name (enables exportStatus when present)
    target:
      name: target
      in: query
      schema:
        type: string
      description: Filter items by KollectTarget name
    group:
      name: group
      in: query
      schema:
        type: string
    version:
      name: version
      in: query
      schema:
        type: string
    kind:
      name: kind
      in: query
      schema:
        type: string
    name:
      name: name
      in: query
      schema:
        type: string
      description: Filter items by resource name
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 0
      description: Page size (default 500)
    offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
      description: Page offset
  schemas:
    Item:
      type: object
      required:
        - targetNamespace
        - targetName
        - namespace
        - name
        - version
        - kind
        - uid
        - attributes
      properties:
        targetNamespace:
          type: string
        targetName:
          type: string
        namespace:
          type: string
        name:
          type: string
        group:
          type: string
        version:
          type: string
        kind:
          type: string
        uid:
          type: string
        attributes:
          type: object
          additionalProperties: true
    Pagination:
      type: object
      required:
        - limit
        - offset
        - total
        - hasMore
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
        hasMore:
          type: boolean
    ExportStatus:
      type: object
      required:
        - sinkName
        - status
      properties:
        sinkName:
          type: string
        sinkNamespace:
          type: string
        status:
          type: string
          enum: [ok, degraded, unknown]
        lastExportTime:
          type: string
          format: date-time
        message:
          type: string
    InventorySummary:
      type: object
      required:
        - schemaVersion
        - itemCount
        - items
        - updatedAt
      properties:
        schemaVersion:
          type: string
          example: kollect.dev/v1alpha1
        itemCount:
          type: integer
        namespace:
          type: string
        inventory:
          type: string
        updatedAt:
          type: string
          format: date-time
        checksum:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        pagination:
          $ref: "#/components/schemas/Pagination"
        exportStatus:
          type: array
          items:
            $ref: "#/components/schemas/ExportStatus"
    Condition:
      type: object
      properties:
        type:
          type: string
        status:
          type: string
        reason:
          type: string
        message:
          type: string
        lastTransitionTime:
          type: string
          format: date-time
        observedGeneration:
          type: integer
    ResourceStatus:
      type: object
      required:
        - name
        - namespace
      properties:
        name:
          type: string
        namespace:
          type: string
        generation:
          type: integer
        observedGeneration:
          type: integer
        itemCount:
          type: integer
        lastExportTime:
          type: string
          format: date-time
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/Condition"
    StatusListResponse:
      type: object
      required:
        - schemaVersion
        - items
      properties:
        schemaVersion:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResourceStatus"

version: 3
workdir: .
exclude:
  - cmd/**
  - hack/**
  - test/**
  - ui/**
  - charts/**
  - config/**
  - bin/**
  - dist/**
  - references/**
  - kollect-repos/**
  - agent-context/**
allow:
  depOnAnyVendor: true

# Vendor nodes for `task arch-lint:graph` (--include-vendors reads canUse below).
vendors:
  controller-runtime:
    in: sigs.k8s.io/controller-runtime/**
  client-go:
    in: k8s.io/client-go/**
  k8s-api:
    in:
      - k8s.io/api/**
      - k8s.io/apimachinery/**
  cel-go:
    in: github.com/google/cel-go/**
  aws-sdk:
    in: github.com/aws/aws-sdk-go-v2/**
  go-git:
    in: github.com/go-git/**
  pgx:
    in: github.com/jackc/pgx/**
  nats:
    in: github.com/nats-io/**
  kafka:
    in: github.com/segmentio/kafka-go/**
  prometheus:
    in: github.com/prometheus/client_golang/**
  redis:
    in: github.com/redis/go-redis/**
  parquet:
    in: github.com/parquet-go/**
  otel:
    in: go.opentelemetry.io/**

components:
  api:
    in: api/**
  collect:
    in: internal/collect/**
  aggregate:
    in: internal/aggregate/**
  validation:
    in: internal/validation/**
  scope:
    in: internal/scope/**
  sink:
    in: internal/sink/**
  transport:
    in: internal/transport/**
  controller:
    in: internal/controller/**
  hub:
    in: internal/hub/**
  spoke:
    in: internal/spoke/**
  inventory:
    in: internal/inventory/**
  export:
    in: internal/export/**
  webhook:
    in: internal/webhook/**
  shared:
    in:
      - internal/digest/**
      - internal/errors/**
      - internal/metrics/**
      - internal/httpauth/**
      - internal/pathvalidate/**
      - internal/remotecredentials/**
      - internal/remotesecret/**
      - internal/operator/**
      - internal/pprof/**
      - internal/integrationtest/**

commonComponents:
  - api
  - shared
  - validation
  - scope

deps:
  controller:
    mayDependOn:
      - collect
      - aggregate
      - sink
      - hub
      - scope
      - validation
      - export
      # todo(arch-01): extract spoke publish behind export/transport facade; controller should not import spoke
      - spoke
    canUse:
      - controller-runtime
      - client-go
      - k8s-api
  collect:
    mayDependOn:
      - aggregate
    canUse:
      - controller-runtime
      - client-go
      - k8s-api
      - cel-go
  aggregate:
    mayDependOn:
      # todo(arch-02): dedupe.go imports collect.Row; move row types to aggregate or shared
      - collect
  sink:
    mayDependOn:
      - transport
      - export
      - sink
      # todo(arch-03): sink backends read collect rows during export; narrow to export envelope types
      - collect
    canUse:
      - aws-sdk
      - go-git
      - pgx
      - nats
      - kafka
      - prometheus
      - redis
      - parquet
  hub:
    mayDependOn:
      - sink
      - aggregate
      - export
      - hub
      # todo(arch-05): hub merge/ingest uses collect.Row; target: aggregate-only merge API
      - collect
      # todo(arch-06): hub consumer wires NATS/Kafka transport directly
      - transport
    canUse:
      - controller-runtime
      - client-go
      - k8s-api
  spoke:
    mayDependOn:
      - transport
      - hub
      - spoke
      # todo(arch-07): spoke publisher builds collect rows + export envelope
      - collect
      - export
    canUse:
      - controller-runtime
      - client-go
      - k8s-api
  inventory:
    mayDependOn:
      - collect
      - aggregate
      - scope
    canUse:
      - controller-runtime
      - client-go
      - k8s-api
  export:
    mayDependOn:
      # todo(arch-08): export.Envelope wraps collect.Row; introduce neutral DTO in export
      - collect
  transport:
    mayDependOn:
      - transport
      # todo(arch-09): transport helpers reference hub ingest config
      - hub
    canUse:
      - nats
      - kafka
  validation:
    mayDependOn:
      # todo(arch-10): validation reuses collect attribute paths for profiles
      - collect
    canUse:
      - k8s-api
  webhook:
    mayDependOn:
      - validation
      - scope
    canUse:
      - controller-runtime
      - k8s-api

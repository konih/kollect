description: spec defines the desired state of KollectInventory
properties:
  databaseSinkRefs:
    description: databaseSinkRefs lists KollectDatabaseSink names in this namespace
      (ADR-0414).
    items:
      description: InventorySinkRef names a KollectSink with an optional per-ref export
        interval override.
      properties:
        exportMinInterval:
          description: |-
            exportMinInterval overrides the inventory default for this sink ref.
            Zero means material-change only (no periodic re-export of identical payload).
          type: string
        name:
          description: name is the family sink object name.
          type: string
        namespace:
          description: |-
            namespace overrides where this sink resolves. Cluster inventory only:
            when omitted it inherits spec.sinkNamespace. Forbidden on namespaced inventories,
            which always resolve in the inventory's own namespace (ADR-0208).
          type: string
      required:
      - name
      type: object
    type: array
  eventSinkRefs:
    description: eventSinkRefs lists KollectEventSink names in this namespace (ADR-0414).
    items:
      description: InventorySinkRef names a KollectSink with an optional per-ref export
        interval override.
      properties:
        exportMinInterval:
          description: |-
            exportMinInterval overrides the inventory default for this sink ref.
            Zero means material-change only (no periodic re-export of identical payload).
          type: string
        name:
          description: name is the family sink object name.
          type: string
        namespace:
          description: |-
            namespace overrides where this sink resolves. Cluster inventory only:
            when omitted it inherits spec.sinkNamespace. Forbidden on namespaced inventories,
            which always resolve in the inventory's own namespace (ADR-0208).
          type: string
      required:
      - name
      type: object
    type: array
  exportMinInterval:
    default: 30s
    description: |-
      exportMinInterval is the minimum time between identical exports for this inventory.
      It debounces identical payloads only: material changes (payload checksum or spec
      generation) always export immediately, regardless of the interval. Zero means
      material-change only (no periodic re-export of identical payloads).
    type: string
  httpEndpoint:
    description: httpEndpoint exposes a read-only inventory summary over HTTP when
      enabled.
    properties:
      enabled:
        description: enabled turns on GET /v1alpha1/inventory (aggregated summary
          JSON).
        type: boolean
      port:
        description: port is the listen port for the inventory HTTP server (default
          8082).
        format: int32
        maximum: 65535
        minimum: 1
        type: integer
    type: object
  maxExportBytes:
    description: |-
      maxExportBytes caps the marshalled namespace payload for export and HTTP (optional).
      Webhook rejects values above the operator global cap (ADR-0103).
    format: int64
    type: integer
  snapshotSinkRefs:
    description: snapshotSinkRefs lists KollectSnapshotSink names in this namespace
      (ADR-0414).
    items:
      description: InventorySinkRef names a KollectSink with an optional per-ref export
        interval override.
      properties:
        exportMinInterval:
          description: |-
            exportMinInterval overrides the inventory default for this sink ref.
            Zero means material-change only (no periodic re-export of identical payload).
          type: string
        name:
          description: name is the family sink object name.
          type: string
        namespace:
          description: |-
            namespace overrides where this sink resolves. Cluster inventory only:
            when omitted it inherits spec.sinkNamespace. Forbidden on namespaced inventories,
            which always resolve in the inventory's own namespace (ADR-0208).
          type: string
      required:
      - name
      type: object
    type: array
  suspend:
    description: suspend pauses reconciliation of this inventory when set to true.
    type: boolean
type: object

description: spec defines the desired state of KollectTarget
properties:
  excludedNamespaces:
    description: excludedNamespaces is a static namespace denylist applied after include
      logic.
    items:
      type: string
    type: array
    x-kubernetes-list-type: set
  includedNamespaces:
    description: |-
      includedNamespaces is a static namespace allowlist. Empty means no extra restriction
      beyond namespaceSelector.
    items:
      type: string
    type: array
    x-kubernetes-list-type: set
  labelSelector:
    description: labelSelector restricts collection to resources matching the selector.
    properties:
      matchExpressions:
        description: matchExpressions is a list of label selector requirements. The
          requirements are ANDed.
        items:
          description: |-
            A label selector requirement is a selector that contains values, a key, and an operator that
            relates the key and values.
          properties:
            key:
              description: key is the label key that the selector applies to.
              type: string
            operator:
              description: |-
                operator represents a key's relationship to a set of values.
                Valid operators are In, NotIn, Exists and DoesNotExist.
              type: string
            values:
              description: |-
                values is an array of string values. If the operator is In or NotIn,
                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                the values array must be empty. This array is replaced during a strategic
                merge patch.
              items:
                type: string
              type: array
              x-kubernetes-list-type: atomic
          required:
          - key
          - operator
          type: object
        type: array
        x-kubernetes-list-type: atomic
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
        type: object
    type: object
    x-kubernetes-map-type: atomic
  names:
    description: names optionally restricts collection to resources with these names.
    items:
      type: string
    type: array
  namespaceExcludeSelector:
    description: namespaceExcludeSelector excludes namespaces whose labels match the
      selector.
    properties:
      matchExpressions:
        description: matchExpressions is a list of label selector requirements. The
          requirements are ANDed.
        items:
          description: |-
            A label selector requirement is a selector that contains values, a key, and an operator that
            relates the key and values.
          properties:
            key:
              description: key is the label key that the selector applies to.
              type: string
            operator:
              description: |-
                operator represents a key's relationship to a set of values.
                Valid operators are In, NotIn, Exists and DoesNotExist.
              type: string
            values:
              description: |-
                values is an array of string values. If the operator is In or NotIn,
                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                the values array must be empty. This array is replaced during a strategic
                merge patch.
              items:
                type: string
              type: array
              x-kubernetes-list-type: atomic
          required:
          - key
          - operator
          type: object
        type: array
        x-kubernetes-list-type: atomic
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
        type: object
    type: object
    x-kubernetes-map-type: atomic
  namespaceSelector:
    description: namespaceSelector restricts collection to namespaces matching the
      selector.
    properties:
      matchExpressions:
        description: matchExpressions is a list of label selector requirements. The
          requirements are ANDed.
        items:
          description: |-
            A label selector requirement is a selector that contains values, a key, and an operator that
            relates the key and values.
          properties:
            key:
              description: key is the label key that the selector applies to.
              type: string
            operator:
              description: |-
                operator represents a key's relationship to a set of values.
                Valid operators are In, NotIn, Exists and DoesNotExist.
              type: string
            values:
              description: |-
                values is an array of string values. If the operator is In or NotIn,
                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                the values array must be empty. This array is replaced during a strategic
                merge patch.
              items:
                type: string
              type: array
              x-kubernetes-list-type: atomic
          required:
          - key
          - operator
          type: object
        type: array
        x-kubernetes-list-type: atomic
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
        type: object
    type: object
    x-kubernetes-map-type: atomic
  profileRef:
    description: profileRef is the name of a KollectProfile in the same namespace
      as this Target.
    type: string
  resourceRules:
    description: |-
      resourceRules declares GVK-scoped collection rules. When empty, collection falls back to
      Profile targetGVK plus legacy labelSelector/names on the Target.
    items:
      description: |-
        ResourceRule selects objects of a GVK within optional namespace and resource label constraints.
        Multiple rules are OR-unioned (D7). Optional matchPolicy is a CEL expression evaluated pre-store.
      properties:
        gvk:
          description: gvk is the API group, version, and kind this rule applies to.
          properties:
            group:
              description: group is the API group of the target resource (empty for
                the core group).
              type: string
            kind:
              description: kind is the API kind of the target resource.
              type: string
            version:
              description: version is the API version of the target resource.
              type: string
          required:
          - kind
          - version
          type: object
        matchExpressions:
          description: matchExpressions requires resource metadata labels to match.
          items:
            description: |-
              A label selector requirement is a selector that contains values, a key, and an operator that
              relates the key and values.
            properties:
              key:
                description: key is the label key that the selector applies to.
                type: string
              operator:
                description: |-
                  operator represents a key's relationship to a set of values.
                  Valid operators are In, NotIn, Exists and DoesNotExist.
                type: string
              values:
                description: |-
                  values is an array of string values. If the operator is In or NotIn,
                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                  the values array must be empty. This array is replaced during a strategic
                  merge patch.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: atomic
            required:
            - key
            - operator
            type: object
          type: array
        matchLabels:
          additionalProperties:
            type: string
          description: matchLabels requires resource metadata labels to match (AND
            with matchExpressions).
          type: object
        matchPolicy:
          description: |-
            matchPolicy is an optional CEL expression with `object` bound to the resource.
            Evaluated after label/GVK/namespace gates, before store insert (ADR-0207 Phase 3).
          type: string
        namespaceSelector:
          description: namespaceSelector further restricts this rule to namespaces
            matching the selector.
          properties:
            matchExpressions:
              description: matchExpressions is a list of label selector requirements.
                The requirements are ANDed.
              items:
                description: |-
                  A label selector requirement is a selector that contains values, a key, and an operator that
                  relates the key and values.
                properties:
                  key:
                    description: key is the label key that the selector applies to.
                    type: string
                  operator:
                    description: |-
                      operator represents a key's relationship to a set of values.
                      Valid operators are In, NotIn, Exists and DoesNotExist.
                    type: string
                  values:
                    description: |-
                      values is an array of string values. If the operator is In or NotIn,
                      the values array must be non-empty. If the operator is Exists or DoesNotExist,
                      the values array must be empty. This array is replaced during a strategic
                      merge patch.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                required:
                - key
                - operator
                type: object
              type: array
              x-kubernetes-list-type: atomic
            matchLabels:
              additionalProperties:
                type: string
              description: |-
                matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                map is equivalent to an element of matchExpressions, whose key field is "key", the
                operator is "In", and the values array contains only "value". The requirements are ANDed.
              type: object
          type: object
          x-kubernetes-map-type: atomic
      required:
      - gvk
      type: object
    type: array
    x-kubernetes-list-type: atomic
  suspend:
    description: suspend pauses reconciliation of this target when set to true.
    type: boolean
  watchMode:
    default: All
    description: |-
      watchMode controls namespace/resource watch opt-in vs opt-out (ADR-0205).
      All (default): collect matching selectors except resources/namespaces explicitly disabled.
      OptIn: only collect resources/namespaces explicitly enabled via kollect.dev/watch or
      kollect.dev/namespace-watch.
    enum:
    - All
    - OptIn
    type: string
required:
- profileRef
type: object

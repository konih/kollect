description: spec defines the desired state of KollectTarget
properties:
  labelSelector:
    description: labelSelector restricts collection to resources matching the selector.
    properties:
      matchExpressions:
        description: matchExpressions is a list of label selector requirements. The
          requirements are ANDed.
        items:
          description: |-
            A label selector requirement is a selector that contains values, a key, and an operator that
            relates the key and values.
          properties:
            key:
              description: key is the label key that the selector applies to.
              type: string
            operator:
              description: |-
                operator represents a key's relationship to a set of values.
                Valid operators are In, NotIn, Exists and DoesNotExist.
              type: string
            values:
              description: |-
                values is an array of string values. If the operator is In or NotIn,
                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                the values array must be empty. This array is replaced during a strategic
                merge patch.
              items:
                type: string
              type: array
              x-kubernetes-list-type: atomic
          required:
          - key
          - operator
          type: object
        type: array
        x-kubernetes-list-type: atomic
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
        type: object
    type: object
    x-kubernetes-map-type: atomic
  names:
    description: names optionally restricts collection to resources with these names.
    items:
      type: string
    type: array
  namespaceSelector:
    description: namespaceSelector restricts collection to namespaces matching the
      selector.
    properties:
      matchExpressions:
        description: matchExpressions is a list of label selector requirements. The
          requirements are ANDed.
        items:
          description: |-
            A label selector requirement is a selector that contains values, a key, and an operator that
            relates the key and values.
          properties:
            key:
              description: key is the label key that the selector applies to.
              type: string
            operator:
              description: |-
                operator represents a key's relationship to a set of values.
                Valid operators are In, NotIn, Exists and DoesNotExist.
              type: string
            values:
              description: |-
                values is an array of string values. If the operator is In or NotIn,
                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                the values array must be empty. This array is replaced during a strategic
                merge patch.
              items:
                type: string
              type: array
              x-kubernetes-list-type: atomic
          required:
          - key
          - operator
          type: object
        type: array
        x-kubernetes-list-type: atomic
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
        type: object
    type: object
    x-kubernetes-map-type: atomic
  profileRef:
    description: profileRef is the name of a KollectProfile in the same namespace
      as this Target.
    type: string
  suspend:
    description: suspend pauses reconciliation of this target when set to true.
    type: boolean
  watchMode:
    default: All
    description: |-
      watchMode controls namespace/resource watch opt-in vs opt-out (ADR-0029).
      All (default): collect matching selectors except resources/namespaces explicitly disabled.
      OptIn: only collect resources/namespaces explicitly enabled via kollect.dev/watch or
      kollect.dev/namespace-watch.
    enum:
    - All
    - OptIn
    type: string
required:
- profileRef
type: object

description: spec defines the desired state of KollectClusterInventory
properties:
  databaseSinkRefs:
    description: |-
      databaseSinkRefs lists namespaced KollectDatabaseSink refs (ADR-0414, ADR-0208).
      Each ref resolves in its own namespace, or spec.sinkNamespace when omitted.
    items:
      description: InventorySinkRef names a KollectSink with an optional per-ref export
        interval override.
      properties:
        exportMinInterval:
          description: |-
            exportMinInterval overrides the inventory default for this sink ref.
            Zero means material-change only (no periodic re-export of identical payload).
          type: string
        name:
          description: name is the family sink object name.
          type: string
        namespace:
          description: |-
            namespace overrides where this sink resolves. Cluster inventory only:
            when omitted it inherits spec.sinkNamespace. Forbidden on namespaced inventories,
            which always resolve in the inventory's own namespace (ADR-0208).
          type: string
      required:
      - name
      type: object
    type: array
  dedupe:
    default: keepAll
    description: dedupe selects how overlapping target rows collapse on export (ADR-0305).
    enum:
    - keepAll
    - byResourceUID
    type: string
  eventSinkRefs:
    description: |-
      eventSinkRefs lists namespaced KollectEventSink refs (ADR-0414, ADR-0208).
      Each ref resolves in its own namespace, or spec.sinkNamespace when omitted.
    items:
      description: InventorySinkRef names a KollectSink with an optional per-ref export
        interval override.
      properties:
        exportMinInterval:
          description: |-
            exportMinInterval overrides the inventory default for this sink ref.
            Zero means material-change only (no periodic re-export of identical payload).
          type: string
        name:
          description: name is the family sink object name.
          type: string
        namespace:
          description: |-
            namespace overrides where this sink resolves. Cluster inventory only:
            when omitted it inherits spec.sinkNamespace. Forbidden on namespaced inventories,
            which always resolve in the inventory's own namespace (ADR-0208).
          type: string
      required:
      - name
      type: object
    type: array
  exportMinInterval:
    default: 30s
    description: |-
      exportMinInterval is the minimum time between identical exports for this inventory.
      It debounces identical payloads only: material changes (payload checksum or spec
      generation) always export immediately, regardless of the interval. Zero means
      material-change only (no periodic re-export of identical payloads).
    type: string
  namespaceSelector:
    description: namespaceSelector restricts rollup to namespaces matching the selector.
    properties:
      matchExpressions:
        description: matchExpressions is a list of label selector requirements. The
          requirements are ANDed.
        items:
          description: |-
            A label selector requirement is a selector that contains values, a key, and an operator that
            relates the key and values.
          properties:
            key:
              description: key is the label key that the selector applies to.
              type: string
            operator:
              description: |-
                operator represents a key's relationship to a set of values.
                Valid operators are In, NotIn, Exists and DoesNotExist.
              type: string
            values:
              description: |-
                values is an array of string values. If the operator is In or NotIn,
                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                the values array must be empty. This array is replaced during a strategic
                merge patch.
              items:
                type: string
              type: array
              x-kubernetes-list-type: atomic
          required:
          - key
          - operator
          type: object
        type: array
        x-kubernetes-list-type: atomic
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
        type: object
    type: object
    x-kubernetes-map-type: atomic
  namespaces:
    description: |-
      namespaces explicitly lists namespace names that may contribute to the rollup.
      When set with namespaceSelector, the effective rollup scope is their intersection.
    items:
      maxLength: 63
      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
      type: string
    type: array
    x-kubernetes-list-type: set
  profileRef:
    description: |-
      profileRef optionally overrides the rollup extraction schema with a namespaced
      KollectProfile by name and namespace (ADR-0208). namespace is required when set.
    properties:
      name:
        description: name is the referenced object's name.
        type: string
      namespace:
        description: |-
          namespace is the referenced object's namespace.
          Required on cluster-scoped kinds; optional where a default namespace applies.
        type: string
    required:
    - name
    type: object
  sinkNamespace:
    default: kollect-system
    description: sinkNamespace is the default namespace for family sink refs that
      omit a namespace.
    type: string
  snapshotSinkRefs:
    description: |-
      snapshotSinkRefs lists namespaced KollectSnapshotSink refs (ADR-0414, ADR-0208).
      Each ref resolves in its own namespace, or spec.sinkNamespace when omitted.
    items:
      description: InventorySinkRef names a KollectSink with an optional per-ref export
        interval override.
      properties:
        exportMinInterval:
          description: |-
            exportMinInterval overrides the inventory default for this sink ref.
            Zero means material-change only (no periodic re-export of identical payload).
          type: string
        name:
          description: name is the family sink object name.
          type: string
        namespace:
          description: |-
            namespace overrides where this sink resolves. Cluster inventory only:
            when omitted it inherits spec.sinkNamespace. Forbidden on namespaced inventories,
            which always resolve in the inventory's own namespace (ADR-0208).
          type: string
      required:
      - name
      type: object
    type: array
  suspend:
    description: suspend pauses reconciliation when set to true.
    type: boolean
  targetRefs:
    description: |-
      targetRefs lists KollectClusterTarget names to aggregate.
      When empty, all cluster targets matching targetSelector are included; when targetSelector is
      also empty, all KollectClusterTarget objects contribute.
    items:
      type: string
    type: array
  targetSelector:
    description: targetSelector narrows which KollectClusterTarget objects contribute
      when targetRefs is empty.
    properties:
      matchExpressions:
        description: matchExpressions is a list of label selector requirements. The
          requirements are ANDed.
        items:
          description: |-
            A label selector requirement is a selector that contains values, a key, and an operator that
            relates the key and values.
          properties:
            key:
              description: key is the label key that the selector applies to.
              type: string
            operator:
              description: |-
                operator represents a key's relationship to a set of values.
                Valid operators are In, NotIn, Exists and DoesNotExist.
              type: string
            values:
              description: |-
                values is an array of string values. If the operator is In or NotIn,
                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                the values array must be empty. This array is replaced during a strategic
                merge patch.
              items:
                type: string
              type: array
              x-kubernetes-list-type: atomic
          required:
          - key
          - operator
          type: object
        type: array
        x-kubernetes-list-type: atomic
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
        type: object
    type: object
    x-kubernetes-map-type: atomic
type: object

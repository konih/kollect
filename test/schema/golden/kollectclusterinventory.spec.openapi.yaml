description: spec defines the desired state of KollectClusterInventory
properties:
  dedupe:
    default: keepAll
    description: dedupe selects how overlapping target rows collapse on export (ADR-0305).
    enum:
    - keepAll
    - byResourceUID
    type: string
  exportMinInterval:
    default: 30s
    description: |-
      exportMinInterval is the minimum time between identical exports for this inventory.
      Material changes (payload checksum or spec generation) bypass the interval.
    type: string
  namespaceSelector:
    description: namespaceSelector restricts rollup to namespaces matching the selector.
    properties:
      matchExpressions:
        description: matchExpressions is a list of label selector requirements. The
          requirements are ANDed.
        items:
          description: |-
            A label selector requirement is a selector that contains values, a key, and an operator that
            relates the key and values.
          properties:
            key:
              description: key is the label key that the selector applies to.
              type: string
            operator:
              description: |-
                operator represents a key's relationship to a set of values.
                Valid operators are In, NotIn, Exists and DoesNotExist.
              type: string
            values:
              description: |-
                values is an array of string values. If the operator is In or NotIn,
                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                the values array must be empty. This array is replaced during a strategic
                merge patch.
              items:
                type: string
              type: array
              x-kubernetes-list-type: atomic
          required:
          - key
          - operator
          type: object
        type: array
        x-kubernetes-list-type: atomic
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
        type: object
    type: object
    x-kubernetes-map-type: atomic
  profileRef:
    description: profileRef names a KollectClusterProfile stub for shared extraction
      schema (optional).
    type: string
  sinkNamespace:
    default: kollect-system
    description: sinkNamespace is the namespace where namespaced KollectSink objects
      are resolved.
    type: string
  sinkRefs:
    description: |-
      sinkRefs lists KollectSink names resolved in sinkNamespace.
      Each entry may be a plain name or an object with an optional exportMinInterval override.
    items:
      description: InventorySinkRef names a KollectSink with an optional per-ref export
        interval override.
      properties:
        exportMinInterval:
          description: |-
            exportMinInterval overrides the inventory default for this sink ref.
            Zero means material-change only (no periodic re-export of identical payload).
          type: string
        name:
          description: name is the KollectSink object name in the same namespace as
            the inventory.
          type: string
      required:
      - name
      type: object
    type: array
  suspend:
    description: suspend pauses reconciliation when set to true.
    type: boolean
  targetRefs:
    description: |-
      targetRefs lists KollectClusterTarget names to aggregate.
      When empty, all cluster targets matching targetSelector are included; when targetSelector is
      also empty, all KollectClusterTarget objects contribute.
    items:
      type: string
    type: array
  targetSelector:
    description: targetSelector narrows which KollectClusterTarget objects contribute
      when targetRefs is empty.
    properties:
      matchExpressions:
        description: matchExpressions is a list of label selector requirements. The
          requirements are ANDed.
        items:
          description: |-
            A label selector requirement is a selector that contains values, a key, and an operator that
            relates the key and values.
          properties:
            key:
              description: key is the label key that the selector applies to.
              type: string
            operator:
              description: |-
                operator represents a key's relationship to a set of values.
                Valid operators are In, NotIn, Exists and DoesNotExist.
              type: string
            values:
              description: |-
                values is an array of string values. If the operator is In or NotIn,
                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                the values array must be empty. This array is replaced during a strategic
                merge patch.
              items:
                type: string
              type: array
              x-kubernetes-list-type: atomic
          required:
          - key
          - operator
          type: object
        type: array
        x-kubernetes-list-type: atomic
      matchLabels:
        additionalProperties:
          type: string
        description: |-
          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
          map is equivalent to an element of matchExpressions, whose key field is "key", the
          operator is "In", and the values array contains only "value". The requirements are ANDed.
        type: object
    type: object
    x-kubernetes-map-type: atomic
type: object

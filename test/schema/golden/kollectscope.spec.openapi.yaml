description: KollectScopeSpec defines a namespaced tenancy boundary for collection
  and sinks.
properties:
  allowedGVKs:
    description: allowedGVKs restricts which target resource kinds may be collected
      in this scope.
    items:
      description: GroupVersionKind identifies the API group, version, and kind of
        a target resource.
      properties:
        group:
          description: group is the API group of the target resource (empty for the
            core group).
          type: string
        kind:
          description: kind is the API kind of the target resource.
          type: string
        version:
          description: version is the API version of the target resource.
          type: string
      required:
      - kind
      - version
      type: object
    type: array
    x-kubernetes-list-type: atomic
  allowedNamespaces:
    description: |-
      allowedNamespaces restricts which workload namespaces may be collected.
      Empty means any namespace allowed by targets in the scope namespace.
    items:
      type: string
    type: array
    x-kubernetes-list-type: set
  databaseSinkRefs:
    description: databaseSinkRefs lists permitted KollectDatabaseSink names for this
      scope.
    items:
      type: string
    type: array
    x-kubernetes-list-type: set
  deniedNamespaces:
    description: deniedNamespaces is a platform blacklist; Target intent cannot override
      (D8).
    items:
      type: string
    type: array
    x-kubernetes-list-type: set
  eventSinkRefs:
    description: eventSinkRefs lists permitted KollectEventSink names for this scope.
    items:
      type: string
    type: array
    x-kubernetes-list-type: set
  minExportInterval:
    description: minExportInterval is a tenancy floor — inventory and sink intervals
      below this value are rejected.
    type: string
  snapshotSinkRefs:
    description: snapshotSinkRefs lists permitted KollectSnapshotSink names for this
      scope.
    items:
      type: string
    type: array
    x-kubernetes-list-type: set
type: object

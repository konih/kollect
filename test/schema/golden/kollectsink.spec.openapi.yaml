description: spec defines the desired state of KollectSink
properties:
  cluster:
    description: cluster labels exported inventory in multi-cluster installs.
    type: string
  connectionTest:
    description: |-
      connectionTest requests a connectivity check on create/update when true.
      The annotation kollect.dev/test-connection=true has the same effect.
    type: boolean
  endpoint:
    description: endpoint is the backend-specific destination (URL, bucket, and so
      on).
    type: string
  gitlab:
    description: gitlab configures GitLab-specific settings when type is gitlab.
    properties:
      mergeRequest:
        description: mergeRequest configures optional branch + merge request workflow
          after git push.
        properties:
          autoMerge:
            description: autoMerge requests auto-merge when the MR pipeline succeeds
              (not yet implemented).
            type: boolean
          branchPrefix:
            description: branchPrefix prefixes feature branches (default kollect).
            type: string
          mode:
            description: mode selects direct push to the default branch or branch
              + merge request workflow.
            enum:
            - direct
            - merge_request
            type: string
          targetBranch:
            description: targetBranch is the MR target branch (required when mode
              is merge_request).
            type: string
          titleTemplate:
            description: titleTemplate is an optional MR title template with {namespace}
              and {name} placeholders.
            type: string
        type: object
    type: object
  kafka:
    description: kafka configures a Kafka or Redpanda event sink.
    properties:
      brokers:
        description: brokers lists Kafka bootstrap addresses (host:port).
        items:
          type: string
        type: array
        x-kubernetes-list-type: atomic
      secretRef:
        description: secretRef references a Secret with optional SASL/TLS credentials.
        properties:
          name:
            description: name is the name of the referenced Secret.
            type: string
          namespace:
            description: namespace is the namespace of the referenced Secret.
            type: string
        required:
        - name
        type: object
      topic:
        description: topic is the destination topic for inventory events.
        type: string
    required:
    - brokers
    - topic
    type: object
  nats:
    description: nats configures a NATS JetStream event sink.
    properties:
      secretRef:
        description: secretRef references a Secret with optional auth credentials
          (token, username/password).
        properties:
          name:
            description: name is the name of the referenced Secret.
            type: string
          namespace:
            description: namespace is the namespace of the referenced Secret.
            type: string
        required:
        - name
        type: object
      stream:
        description: stream is the JetStream stream name (default kollect_events).
        type: string
      subject:
        description: subject is the JetStream publish subject for inventory events.
        type: string
      url:
        description: |-
          url is the NATS server connection URL (nats://host:4222).
          When empty, spec.endpoint is used.
        type: string
    required:
    - subject
    type: object
  objectStore:
    description: objectStore configures S3/GCS snapshot export format and layout.
    properties:
      format:
        description: format selects the snapshot serialization (default json).
        enum:
        - json
        - parquet
        type: string
      hotAttributes:
        description: hotAttributes lists profile attribute keys promoted to typed
          Parquet columns (ADR-0401, Q11).
        items:
          type: string
        type: array
        x-kubernetes-list-type: atomic
    type: object
  postgres:
    description: postgres configures a PostgreSQL database sink.
    properties:
      databaseRef:
        description: databaseRef references a Secret containing the connection string
          (key dsn or url).
        properties:
          name:
            description: name is the name of the referenced Secret.
            type: string
          namespace:
            description: namespace is the namespace of the referenced Secret.
            type: string
        required:
        - name
        type: object
      schema:
        description: schema is the PostgreSQL schema (default public).
        type: string
      table:
        description: table is the destination table name.
        type: string
    required:
    - databaseRef
    - table
    type: object
  secretRef:
    description: secretRef references a Secret holding credentials for the sink.
    properties:
      name:
        description: name is the name of the referenced Secret.
        type: string
      namespace:
        description: namespace is the namespace of the referenced Secret.
        type: string
    required:
    - name
    type: object
  tls:
    description: tls configures TLS verification for HTTPS git and similar endpoints.
    properties:
      caBundle:
        description: |-
          caBundle is an inline PEM-encoded CA certificate bundle.
          Prefer caSecretRef for production; do not set both caBundle and caSecretRef.
        format: byte
        type: string
      caSecretRef:
        description: caSecretRef references a Secret containing a PEM CA bundle (key
          tls.crt or ca.crt).
        properties:
          name:
            description: name is the name of the referenced Secret.
            type: string
          namespace:
            description: namespace is the namespace of the referenced Secret.
            type: string
        required:
        - name
        type: object
      insecureSkipVerify:
        description: insecureSkipVerify disables server certificate verification (not
          recommended).
        type: boolean
    type: object
  type:
    description: type selects the sink backend implementation.
    enum:
    - git
    - gitlab
    - s3
    - gcs
    - postgres
    - kafka
    - nats
    type: string
required:
- type
type: object
